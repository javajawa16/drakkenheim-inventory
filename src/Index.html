    /* ── Inventory: load & render ────────────────────────────────── */
    function loadInventory(force = false) {
      const status = document.getElementById('inventoryStatus');
      const list   = document.getElementById('inventoryList');
      const now = Date.now();

      closeInventoryPanels(false);

      let paintedFromCache = false;

      const cachedPayload = getCachedInventoryPayload();
      if (cachedPayload && cachedPayload.rows.length) {
        inventoryRows = cachedPayload.rows;
        inventoryResourceLedger = cachedPayload.resourceLedger;
        renderInventory();
        markInventoryReady();
        paintedFromCache = true;
        status.classList.remove('centered');
        status.textContent = 'Refreshing…';
      }

      if (!paintedFromCache) {
        status.classList.add('centered');
        status.textContent = 'Loading…';
        list.innerHTML = '';
      }

      if (!force && paintedFromCache && (now - lastInventoryLoadAt) < INVENTORY_REVALIDATE_MS) {
        return;
      }

      lastInventoryLoadAt = now;

      google.script.run
        .withSuccessHandler(res => {
          if (!res || !res.ok) {
            if (!inventoryRows.length) {
              status.innerHTML = `<span class="error">${escapeHtml((res && res.error) || 'Failed to load.')}</span>`;
            } else {
              status.classList.remove('centered');
              status.textContent = 'Refresh failed — showing last known data.';
            }
            markInventoryReady();
            return;
          }

          inventoryRows = res.rows || [];
          inventoryResourceLedger = Array.isArray(res.resourceLedger) ? res.resourceLedger : [];

          cacheInventoryRows(inventoryRows, inventoryResourceLedger);
          lastInventoryLoadAt = Date.now();

          renderInventory();
          markInventoryReady();
        })
        .withFailureHandler(err => {
          if (!inventoryRows.length) {
            status.innerHTML = `<span class="error">Load failed: ${escapeHtml(err.message || err)}</span>`;
          } else {
            status.classList.remove('centered');
            status.textContent = 'Refresh failed — showing last known data.';
          }
          markInventoryReady();
        })
        .apiGetInventory();
    }

    function renderInventory() {
      const filter = document.getElementById('inventoryFilter').value.trim().toLowerCase();
      const status = document.getElementById('inventoryStatus');
      const list   = document.getElementById('inventoryList');

      let rows = inventoryRows || [];
      if (filter) {
        rows = rows.filter(r =>
          [r['Item'], r['Category'], r['Rarity'], r['Holder'], r['Faction Relevance'], r['Notes'], r['Date Added']]
            .join(' ').toLowerCase().includes(filter)
        );
      }

      if (!rows.length) {
        status.classList.add('centered');
        status.textContent = filter ? 'No matches.' : 'No inventory yet.';
        list.innerHTML = '';
        return;
      }

      status.classList.remove('centered');
      status.textContent = `${rows.length} item${rows.length === 1 ? '' : 's'}`;

      if (!filter) {
        list.innerHTML = renderInventoryDashboard(rows);
        bindInventoryRowGestures();
        return;
      }

      const swipeOpenPx = getSwipeOpenPx();

      list.innerHTML = rows.map(row => {
        return renderInventoryRowCard(row, { showMeta: true });
      }).join('');

      bindInventoryRowGestures();
    }

    function renderInventoryRowCard(row, options) {
      const opts = options || {};
      const representativeId = row._representativeInventoryId || row['Inventory ID'] || '';
      const rollupKey = row._rollupKey || '';
      const index = inventoryRows.findIndex(r => r['Inventory ID'] === representativeId);
      const inventoryId = escapeHtml(row['Inventory ID'] || '');
      const representativeIdAttr = escapeHtml(representativeId);
      const rollupKeyAttr = escapeHtml(rollupKey);
      const qty = escapeHtml(row['Qty'] || '');
      const item = escapeHtml(row['Item'] || '');
      const holder = escapeHtml(row['Holder'] || '');
      const category = escapeHtml(row['Category'] || '');
      const rarity = escapeHtml(row['Rarity'] || '');
      const valueGp = escapeHtml(row['Value GP'] || '');
      const isSwiped = swipedInventoryId && swipedInventoryId === row['Inventory ID'];
      const swipeOpenPx = getSwipeOpenPx();
      const metaParts = opts.showMeta ? [
        category,
        rarity,
        holder ? `${holder}` : ''
      ].filter(Boolean) : [];

      if (opts.showMeta && valueGp) metaParts.push(`${valueGp} gp`);
      if (row._rollupCount > 1) metaParts.push(`${row._rollupCount} additions`);

      const meta = metaParts.join(' · ');
      const offsetStyle = isSwiped ? ` style="transform:translateX(-${swipeOpenPx}px)"` : '';

      return `
        <div class="inventory-row" data-index="${index}" data-inventory-id="${inventoryId}" data-representative-id="${representativeIdAttr}">
          <button
            class="inventory-delete-action"
            type="button"
            data-representative-id="${representativeIdAttr}"
            data-rollup-key="${rollupKeyAttr}"
            onclick="event.stopPropagation(); handleInventoryDeleteActionById(this.dataset.representativeId, this.dataset.rollupKey || '')"
            style="width:${swipeOpenPx}px"
          >Delete</button>
          <div class="inventory-card" id="inventory_${index}"${offsetStyle}
               data-representative-id="${representativeIdAttr}"
               onclick="handleInventoryCardClickById(this.dataset.representativeId)"
               ondblclick="event.stopPropagation(); openInventoryDescriptionById(this.dataset.representativeId)">
            <div class="item-title">${qty ? qty + '× ' : ''}${item}</div>
            ${meta ? `<div class="item-meta">${meta}</div>` : ''}
          </div>
        </div>
      `;
    }

    function renderInventoryDashboard(rows) {
      const totals = rows.reduce((acc, row) => {
        const name = String(row['Item'] || '').toLowerCase();
        const category = String(row['Category'] || '').toLowerCase();
        const qty = toNumber(row['Qty'] || 0);

        if (category === 'currency' || /\b(gold|gp|platinum|pp|silver|sp|copper|cp)\b/.test(name)) {
          acc.gold += getGoldEquivalent(row);
        }

        if (category === 'delerium' || /delerium|delirium/.test(name)) {
          acc.delerium += qty;
        }

        return acc;
      }, { gold: 0, delerium: 0 });

      const groups = buildInventoryGroups(rows);

      return `
        <div class="dashboard-grid">
          <button class="dashboard-stat" type="button" onclick="toggleResourceBreakout('gold')">
            <div class="dashboard-value">${escapeHtml(formatCount(totals.gold))}</div>
            <div class="dashboard-label">Gold</div>
          </button>
          <button class="dashboard-stat" type="button" onclick="toggleResourceBreakout('delerium')">
            <div class="dashboard-value">${escapeHtml(formatCount(totals.delerium))}</div>
            <div class="dashboard-label">Delerium</div>
          </button>
          ${expandedResource ? renderResourceBreakout(expandedResource, rows) : ''}
        </div>
        ${groups.map(group => renderInventoryGroup(group)).join('')}
        ${renderNotesShortcut()}
      `;
    }

    function renderNotesShortcut() {
      return `
        <div class="inventory-group notes-shortcut">
          <button class="group-toggle" type="button" onclick="openCampaignNotes()">
            <span>Notes</span>
            <span class="group-count">Under Construction</span>
          </button>
        </div>
      `;
    }

    function toggleResourceBreakout(resource) {
      expandedResource = expandedResource === resource ? '' : resource;
      renderInventory();
    }

    function renderResourceBreakout(resource, rows) {
      const lines = resource === 'gold'
        ? getGoldBreakout(rows)
        : getDeleriumBreakout(rows);
      const payId = `${resource}PayAmount`;
      const isBusy = Boolean(resourcePayInFlight[resource]);
      const undo = lastResourceUndo[resource];
      const sizeSelect = resource === 'delerium'
        ? `<select id="deleriumPaySize">
             <option value="chip">chip</option>
             <option value="fragment">fragment</option>
             <option value="shard">shard</option>
             <option value="crystal">crystal</option>
             <option value="geode">geode</option>
             <option value="massive cluster">massive cluster</option>
             <option value="unknown">unknown</option>
           </select>`
        : '';

      return `
        <div class="resource-breakout">
          <div class="resource-lines">
            ${lines.map(line => `
              <div class="resource-line">
                <span>${escapeHtml(line.label)}</span>
                <strong>${escapeHtml(formatCount(line.qty))}</strong>
              </div>
            `).join('')}
          </div>
          <div class="resource-pay">
            ${sizeSelect}
            <input id="${payId}" type="number" min="0" step="1" inputmode="decimal" placeholder="Pay">
            <button id="${resource}PayButton" class="danger" type="button" onclick="payResource('${resource}')" ${isBusy ? 'disabled' : ''}>${isBusy ? 'Recording…' : 'Pay'}</button>
          </div>
          ${renderResourceLedger(resource)}
          ${undo ? `
            <div class="resource-undo">
              <div class="status success">${escapeHtml(undo.message || 'Recorded payment.')}</div>
              <button class="secondary" type="button" onclick="undoResourcePay('${resource}')">Undo</button>
            </div>
          ` : `<div id="${resource}PayStatus" class="status"></div>`}
        </div>
      `;
    }

    function renderResourceLedger(resource) {
      const entries = (inventoryResourceLedger || [])
        .filter(entry => String(entry['Resource'] || '').toLowerCase() === resource)
        .slice(0, 8);

      if (!entries.length) {
        return `
          <div class="resource-ledger">
            <div class="resource-ledger-title">Ledger</div>
            <div class="resource-ledger-row">
              <span></span>
              <span>No recent entries.</span>
              <span></span>
            </div>
          </div>
        `;
      }

      return `
        <div class="resource-ledger">
          <div class="resource-ledger-title">Ledger</div>
          ${entries.map(entry => {
            const qty = toNumber(entry['Qty'] || 0);
            const sign = qty >= 0 ? '+' : '-';
            const label = resource === 'gold'
              ? 'Gold'
              : titleCase(entry['Subtype'] || 'delerium');
            return `
              <div class="resource-ledger-row">
                <span class="resource-ledger-delta ${qty < 0 ? 'negative' : ''}">${sign}${escapeHtml(formatCount(Math.abs(qty)))}</span>
                <span>${escapeHtml(label)}</span>
                <span class="resource-ledger-date">${escapeHtml(formatShortDate(entry['Timestamp']))}</span>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }

    function getGoldBreakout(rows) {
      const coins = { platinum: 0, gold: 0, silver: 0, copper: 0 };

      rows.forEach(row => {
        const name = String(row['Item'] || '').toLowerCase();
        const category = String(row['Category'] || '').toLowerCase();
        const qty = toNumber(row['Qty'] || 0);

        if (category !== 'currency' && !/\b(gold|gp|platinum|pp|silver|sp|copper|cp)\b/.test(name)) return;

        if (/\b(platinum|pp)\b/.test(name)) coins.platinum += qty;
        else if (/\b(silver|sp)\b/.test(name)) coins.silver += qty;
        else if (/\b(copper|cp)\b/.test(name)) coins.copper += qty;
        else coins.gold += qty;
      });

      return [
        { label: 'Platinum', qty: coins.platinum },
        { label: 'Gold', qty: coins.gold },
        { label: 'Silver', qty: coins.silver },
        { label: 'Copper', qty: coins.copper }
      ];
    }

    function getGoldEquivalent(row) {
      const name = String(row['Item'] || '').toLowerCase();
      const qty = toNumber(row['Qty'] || 0);

      if (/\b(platinum|pp)\b/.test(name)) return qty * 10;
      if (/\b(silver|sp)\b/.test(name)) return qty * 0.1;
      if (/\b(copper|cp)\b/.test(name)) return qty * 0.01;
      return qty;
    }

    function getDeleriumBreakout(rows) {
      const sizes = {
        chip: 0,
        fragment: 0,
        shard: 0,
        crystal: 0,
        geode: 0,
        'massive cluster': 0,
        unknown: 0
      };

      rows.forEach(row => {
        const name = String(row['Item'] || '').toLowerCase();
        const category = String(row['Category'] || '').toLowerCase();
        const notes = String(row['Notes'] || '').toLowerCase();
        const qty = toNumber(row['Qty'] || 0);

        if (category !== 'delerium' && !/delerium|delirium/.test(name)) return;

        if (name.includes('massive cluster') || notes.includes('massive cluster')) sizes['massive cluster'] += qty;
        else if (name.includes('geode') || name.includes('large crystal') || notes.includes('geode') || notes.includes('large crystal')) sizes.geode += qty;
        else if (name.includes('chip') || notes.includes('chip')) sizes.chip += qty;
        else if (name.includes('fragment') || notes.includes('fragment')) sizes.fragment += qty;
        else if (name.includes('shard') || notes.includes('shard')) sizes.shard += qty;
        else if (name.includes('unknown') || notes.includes('unknown')) sizes.unknown += qty;
        else sizes.crystal += qty;
      });

      return Object.keys(sizes).map(size => ({
        label: titleCase(size),
        qty: sizes[size]
      }));
    }

    function buildInventoryGroups(rows) {
      const groupMap = {
        weapons: { key: 'weapons', label: 'Weapons', rows: [] },
        armor: { key: 'armor', label: 'Armor', rows: [] },
        accessories: { key: 'accessories', label: 'Accessories', rows: [] },
        potions: { key: 'potions', label: 'Potions', rows: [] },
        treasure: { key: 'treasure', label: 'Treasure', rows: [] },
        misc: { key: 'misc', label: 'Misc', rows: [] }
      };

      rows.forEach(row => {
        if (isDashboardResourceRow_(row)) return;
        const key = getInventoryGroupKey(row);
        groupMap[key].rows.push(row);
      });

      return Object.values(groupMap).filter(group => group.rows.length);
    }

    function isDashboardResourceRow_(row) {
      const name = String(row['Item'] || '').toLowerCase();
      const category = String(row['Category'] || '').toLowerCase();

      return (
        category === 'currency' ||
        category === 'delerium' ||
        /\b(gold|gp|platinum|pp|silver|sp|copper|cp)\b/.test(name) ||
        /delerium|delirium/.test(name)
      );
    }

    function getInventoryGroupKey(row) {
      const category = String(row['Category'] || '').toLowerCase();
      const name = String(row['Item'] || '').toLowerCase();

      if (category.includes('weapon') || /\b(sword|bow|axe|dagger|mace|staff|rapier|scimitar|arrow)\b/.test(name)) {
        return 'weapons';
      }

      if (category.includes('armor') || category.includes('shield') || /\b(armor|shield|breastplate|mail|plate)\b/.test(name)) {
        return 'armor';
      }

      if (isTreasureItem_(row)) {
        return 'treasure';
      }

      if (category.includes('potion') || name.includes('potion')) {
        return 'potions';
      }

      if (isAccessoryItem_(row)) {
        return 'accessories';
      }

      return 'misc';
    }

    function isAccessoryItem_(row) {
      const name = String(row['Item'] || '').toLowerCase();
      const category = String(row['Category'] || '').toLowerCase();
      const accessoryWords = /\b(ring|amulet|cloak|boots|gloves|gauntlets|bracers|belt|brooch|circlet|crown|hat|helm|helmet|goggles|mask|mantle|necklace|pendant|robe|robes|slippers|earring)\b/;

      return (
        category.includes('wondrous') ||
        category.includes('accessor')
      ) && accessoryWords.test(name);
    }

    function isTreasureItem_(row) {
      const name = String(row['Item'] || '').toLowerCase();
      const category = String(row['Category'] || '').toLowerCase();

      return (
        category.includes('treasure') ||
        /\b(gem|gemstone|jewel|art object|trade goods|treasure)\b/.test(name)
      );
    }

    function renderInventoryGroup(group) {
      const isOpen = Boolean(inventoryExpandedGroups[group.key]);
      const displayRows = rollupInventoryRows(group.rows);
      const totalQty = displayRows.reduce((sum, row) => sum + toNumber(row['Qty'] || 0), 0);

      return `
        <div class="inventory-group">
          <button class="group-toggle" type="button" onclick="toggleInventoryGroup('${group.key}')">
            <span>${escapeHtml(group.label)}</span>
            <span class="group-count">${displayRows.length} item${displayRows.length === 1 ? '' : 's'} · ${escapeHtml(formatCount(totalQty))}</span>
          </button>
          ${isOpen ? `<div class="group-list">${displayRows.map(row => renderInventoryRowCard(row, { showMeta: false })).join('')}</div>` : ''}
        </div>
      `;
    }

    function getInventoryRollupKey(row) {
      return [
        String(row['Item'] || '').trim().toLowerCase(),
        String(row['Category'] || '').trim().toLowerCase(),
        String(row['Rarity'] || '').trim().toLowerCase()
      ].join('|');
    }

    function rollupInventoryRows(rows) {
      const map = new Map();

      (rows || []).forEach(row => {
        const key = getInventoryRollupKey(row);

        if (!map.has(key)) {
          map.set(key, {
            ...row,
            _representativeInventoryId: row['Inventory ID'] || '',
            _rollupCount: 1,
            _rollupKey: key
          });
          return;
        }

        const existing = map.get(key);
        existing['Qty'] = toNumber(existing['Qty'] || 0) + toNumber(row['Qty'] || 0);
        existing._rollupCount += 1;

        if (existing['Holder'] && row['Holder'] && existing['Holder'] !== row['Holder']) {
          existing['Holder'] = 'Multiple';
        } else if (!existing['Holder']) {
          existing['Holder'] = row['Holder'] || '';
        }

        if (!existing['Notes'] && row['Notes']) {
          existing['Notes'] = row['Notes'];
        }
      });

      return Array.from(map.values()).sort((a, b) =>
        String(a['Item'] || '').localeCompare(String(b['Item'] || ''))
      );
    }

    function toggleInventoryGroup(key) {
      inventoryExpandedGroups[key] = !inventoryExpandedGroups[key];
      renderInventory();
    }

    function payResource(resource) {
      if (resourcePayInFlight[resource]) return;

      const amountInput = document.getElementById(`${resource}PayAmount`);
      const status = document.getElementById(`${resource}PayStatus`);
      const button = document.getElementById(`${resource}PayButton`);
      const amount = Number(amountInput && amountInput.value);
      const sizeSelect = document.getElementById('deleriumPaySize');

      if (!Number.isFinite(amount) || amount <= 0) {
        if (status) status.innerHTML = '<span class="error">Enter an amount to pay.</span>';
        return;
      }

      resourcePayInFlight[resource] = true;
      lastResourceUndo[resource] = null;
      if (button) {
        button.disabled = true;
        button.textContent = 'Recording…';
      }
      if (amountInput) {
        amountInput.dataset.lastPaidAmount = String(amount);
        amountInput.value = '';
      }
      if (status) status.textContent = 'Recording…';

      google.script.run
        .withSuccessHandler(res => {
          resourcePayInFlight[resource] = false;
          if (!res || !res.ok) {
            if (button) {
              button.disabled = false;
              button.textContent = 'Pay';
            }
            if (status) status.innerHTML = `<span class="error">${escapeHtml((res && res.error) || 'Pay failed.')}</span>`;
            return;
          }

          primeInventoryCacheAfterAdd(res.item);
          if (res.ledgerEntry) {
            inventoryResourceLedger = [res.ledgerEntry, ...(inventoryResourceLedger || [])].slice(0, 60);
            cacheInventoryRows(inventoryRows, inventoryResourceLedger);
          }
          lastResourceUndo[resource] = {
            item: res.item,
            ledgerEntry: res.ledgerEntry,
            message: res.message || 'Recorded payment.'
          };
          renderInventory();
        })
        .withFailureHandler(err => {
          resourcePayInFlight[resource] = false;
          if (button) {
            button.disabled = false;
            button.textContent = 'Pay';
          }
          if (status) status.innerHTML = `<span class="error">Pay failed: ${escapeHtml(err.message || err)}</span>`;
        })
        .apiDepleteResource({
          resource,
          amount,
          size: resource === 'delerium' && sizeSelect ? sizeSelect.value : '',
          note: 'Dashboard pay'
        });
    }

    function undoResourcePay(resource) {
      const undo = lastResourceUndo[resource];
      const itemId = undo && undo.item && undo.item['Inventory ID'];
      if (!itemId || resourcePayInFlight[resource]) return;

      resourcePayInFlight[resource] = true;

      const previousRows = inventoryRows.slice();
      const previousLedger = inventoryResourceLedger.slice();
      inventoryRows = inventoryRows.filter(row => row['Inventory ID'] !== itemId);
      inventoryResourceLedger = inventoryResourceLedger.filter(entry => entry['Inventory ID'] !== itemId);
      cacheInventoryRows(inventoryRows, inventoryResourceLedger);
      lastResourceUndo[resource] = null;
      renderInventory();

      google.script.run
        .withSuccessHandler(res => {
          resourcePayInFlight[resource] = false;
          if (!res || !res.ok) {
            inventoryRows = previousRows;
            inventoryResourceLedger = previousLedger;
            cacheInventoryRows(inventoryRows, inventoryResourceLedger);
            lastResourceUndo[resource] = undo;
            renderInventory();
          }
        })
        .withFailureHandler(() => {
          resourcePayInFlight[resource] = false;
          inventoryRows = previousRows;
          inventoryResourceLedger = previousLedger;
          cacheInventoryRows(inventoryRows, inventoryResourceLedger);
          lastResourceUndo[resource] = undo;
          renderInventory();
        })
        .apiDeleteInventory(itemId);
    }

    function formatCount(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) return '0';
      if (Number.isInteger(num)) return String(num);
      return String(Math.round(num * 100) / 100);
    }

    function formatShortDate(value) {
      if (!value) return '';

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value).slice(0, 10);

      return date.toLocaleDateString(undefined, {
        month: 'short',
        day: 'numeric'
      });
    }

    function formatShortDateTime(value) {
      if (!value) return '';

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);

      return date.toLocaleString(undefined, {
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit'
      });
    }

    /* ── Inventory: select / edit / save / delete ────────────────── */
    function openInventoryIndexFromGesture(index) {
      if (!Number.isFinite(index) || index < 0) return;
      suppressInventoryClickUntil = Date.now() + 650;
      openInventoryPrimaryAction(index);
    }

    function getInventoryIndexById(inventoryId) {
      return inventoryRows.findIndex(r => r['Inventory ID'] === inventoryId);
    }

    function escapeSelectorValue(value) {
      if (window.CSS && typeof window.CSS.escape === 'function') {
        return window.CSS.escape(value);
      }

      return String(value).replace(/["\\]/g, '\\$&');
    }

    function setSelectedInventoryCardById(inventoryId) {
      document.querySelectorAll('.inventory-card').forEach(c => c.classList.remove('selected'));
      const rowEl = document.querySelector(`.inventory-row[data-representative-id="${escapeSelectorValue(inventoryId)}"] .inventory-card`);
      if (rowEl) rowEl.classList.add('selected');
    }

    function handleInventoryCardClickById(inventoryId) {
      if (Date.now() < suppressInventoryClickUntil) return;
      openInventoryPrimaryActionById(inventoryId);
    }

    function openInventoryPrimaryActionById(inventoryId) {
      const index = getInventoryIndexById(inventoryId);
      if (index < 0) return;

      suppressInventoryClickUntil = Date.now() + 650;
      openInventoryPrimaryAction(index);
    }

    function openInventoryPrimaryAction(index) {
      const row = inventoryRows[index];
      if (!row) return;

      selectedInventory = row;
      setSelectedInventoryCardById(row['Inventory ID'] || '');
      swipedInventoryId = '';

      if (getQuickEditType(row)) {
        openQuickEditPanel(row);
        return;
      }

      openInventoryDescription(index);
    }

    function selectInventoryItem(index) {
      const row = inventoryRows[index];
      if (!row) return;

      swipedInventoryId        = '';
      selectedInventory        = row;
      setSelectedInventoryCardById(row['Inventory ID'] || '');

      if (getQuickEditType(row)) {
        openQuickEditPanel(row);
        return;
      }

      syncInventoryEditorFieldsFromRow(row);
      setInventoryEditorOpen(true);

      if (!isMobileLayout()) {
        document.getElementById('desktopInventoryEditor').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function openSelectedInventoryDescription() {
      if (!selectedInventory) return;
      const index = inventoryRows.findIndex(r => r['Inventory ID'] === selectedInventory['Inventory ID']);
      openInventoryDescription(index);
    }

    function openInventoryDescriptionById(inventoryId) {
      const index = getInventoryIndexById(inventoryId);
      if (index < 0) return;
      openInventoryDescription(index);
    }

    function openInventoryDescription(index) {
      const row = inventoryRows[index];
      if (!row) return;

      selectedInventory = row;
      setSelectedInventoryCardById(row['Inventory ID'] || '');
      document.getElementById('descriptionTitle').textContent = row['Item'] || 'Description';
      document.getElementById('descriptionCategory').textContent = row['Category'] || 'Uncategorized';
      document.getElementById('descriptionRarity').textContent = row['Rarity'] || 'Unrated';
      document.getElementById('descriptionText').textContent = row['Notes'] || 'No notes yet.';
      document.getElementById('descriptionStatus').textContent = 'Inventory details';
      document.getElementById('descriptionSheet').classList.add('active');
      document.body.classList.add('app-modal-open');
    }

    function closeDescriptionSheet() {
      document.getElementById('descriptionSheet').classList.remove('active');
      document.querySelectorAll('.inventory-card').forEach(c => c.classList.remove('selected'));
      syncModalOpenState();
    }

    function deleteSelectedInventoryFromDescription() {
      if (!selectedInventory || !selectedInventory['Inventory ID']) return;
      const inventoryId = selectedInventory['Inventory ID'];
      closeDescriptionSheet();
      deleteSelectedInventory(inventoryId);
    }

    function getQuickEditType(row) {
      const name = String(row && row['Item'] || '').toLowerCase();
      const category = String(row && row['Category'] || '').toLowerCase();

      if (/\b(gold|gp|platinum|pp|silver|sp|copper|cp)\b/.test(name) || category === 'currency') {
        return 'currency';
      }

      if (/health potion|potion of healing/.test(name)) {
        return 'health potion';
      }

      if (/delerium|delirium/.test(name) || category === 'delerium') {
        return 'delerium crystal';
      }

      return '';
    }

    function quickPrefix() {
      return isMobileLayout() ? 'quickSheet' : 'quickDesktop';
    }

    function getQuickStatusElement() {
      return document.getElementById(`${quickPrefix()}Status`);
    }

    function openQuickEditPanel(row) {
      const editType = getQuickEditType(row);
      const prefix = quickPrefix();
      const qty = row['Qty'] || 0;
      const meta = [
        editType,
        row['Holder'] ? `Holder: ${row['Holder']}` : '',
        `Current: ${qty}`
      ].filter(Boolean).join(' · ');

      closeInventoryPanels(false);
      selectedInventory = row;
      selectedQuickEdit = {
        itemId: row['Inventory ID'] || '',
        itemName: row['Item'] || '',
        editType,
        quantity: qty,
        holder: row['Holder'] || '',
        sizeOptions: editType === 'delerium crystal'
          ? ['chip', 'fragment', 'shard', 'crystal', 'geode', 'massive cluster', 'unknown']
          : []
      };

      document.getElementById(`${prefix}Heading`).textContent = editType === 'currency'
        ? 'Quick Currency'
        : editType === 'health potion'
          ? 'Quick Potion'
          : 'Quick Delerium';
      document.getElementById(`${prefix}Title`).textContent = selectedQuickEdit.itemName;
      document.getElementById(`${prefix}Meta`).textContent = meta;
      document.getElementById(`${prefix}Mode`).value = 'add';
      document.getElementById(`${prefix}Amount`).value = '';
      document.getElementById(`${prefix}Note`).value = '';
      document.getElementById(`${prefix}Status`).textContent = '';

      populateQuickSize(prefix, selectedQuickEdit.sizeOptions);
      setQuickEditorOpen(true);

      google.script.run
        .withSuccessHandler(res => {
          if (!selectedQuickEdit || selectedQuickEdit.itemId !== row['Inventory ID']) return;
          if (!res || !res.ok || !res.item) {
            setQuickEditorOpen(false);
            syncInventoryEditorFieldsFromRow(row);
            setInventoryEditorOpen(true);
            getEditStatusElement().innerHTML = `<span class="error">${escapeHtml((res && res.error) || 'Opened full editor instead.')}</span>`;
            return;
          }

          selectedQuickEdit = res.item;
          const activePrefix = quickPrefix();
          document.getElementById(`${activePrefix}Meta`).textContent = [
            res.item.editType,
            res.item.holder ? `Holder: ${res.item.holder}` : '',
            `Current: ${res.item.quantity || 0}`
          ].filter(Boolean).join(' · ');
          populateQuickSize(activePrefix, res.item.sizeOptions || []);
        })
        .withFailureHandler(() => {
          const status = getQuickStatusElement();

    function confirmQuickEdit() {
      if (!selectedQuickEdit || !selectedQuickEdit.itemId) return;

      const prefix = quickPrefix();
      const status = getQuickStatusElement();
      const mode = document.getElementById(`${prefix}Mode`).value;
      const rawAmount = document.getElementById(`${prefix}Amount`).value;
      const amount = Number(rawAmount);
      const note = document.getElementById(`${prefix}Note`).value;
      const sizeSelect = document.getElementById(`${prefix}Size`);
      const size = sizeSelect && sizeSelect.closest('.quick-size-field').classList.contains('active')
        ? sizeSelect.value
        : '';

      if (!Number.isFinite(amount) || amount < 0) {
        status.innerHTML = '<span class="error">Enter a valid amount.</span>';
        return;
      }

      status.textContent = 'Saving…';

      const finishSuccess = res => {
        if (!res || !res.ok) {
          status.innerHTML = `<span class="error">${escapeHtml((res && res.error) || 'Quick edit failed.')}</span>`;
          return;
        }

        if (res.item) {
          updateInventoryRowFromServer(res.item);
        }

        bustInventoryCache();
        cacheInventoryRows(inventoryRows);
        renderInventory();
        status.innerHTML = `<span class="success">${escapeHtml(res.message || 'Saved.')}</span>`;
        closeQuickEditPanel();
      };

      const fail = err => {
        status.innerHTML = `<span class="error">Quick edit failed: ${escapeHtml(err.message || err)}</span>`;
      };

      if (mode === 'set') {
        google.script.run
          .withSuccessHandler(finishSuccess)
          .withFailureHandler(fail)
          .apiSetItemQuantity({
            itemId: selectedQuickEdit.itemId,
            quantity: amount,
            note
          });
        return;
      }

      google.script.run
        .withSuccessHandler(finishSuccess)
        .withFailureHandler(fail)
        .apiAdjustInventory({
          itemId: selectedQuickEdit.itemId,
          delta: mode === 'remove' ? -amount : amount,
          note,
          size
        });
    }

    function saveInventoryEdits() {
      const status  = getEditStatusElement();
      const button  = document.getElementById('saveInventoryButton');
      const payload = getInventoryEditorValues();

      if (!payload.inventoryId) {
        status.innerHTML = '<span class="error">No item selected.</span>';
        return;

      status.textContent = 'Saving…';

      google.script.run
        .withSuccessHandler(res => {

            return;
          }
          status.innerHTML = `<span class="success">${escapeHtml(res.message || 'Saved.')}</span>`;
          updateInventoryRowLocally(payload);
          cacheInventoryRows(inventoryRows);
          renderInventory();

    function updateInventoryRowLocally(payload) {
      const row = inventoryRows.find(r => r['Inventory ID'] === payload.inventoryId);
      if (!row) return;
      row['Qty']               = String(payload.qty || 1);
      row['Holder']            = payload.holder || '';
      row['Value GP']          = payload.valueGp === '' ? '' : String(payload.valueGp);
      row['Total Value GP']    = payload.valueGp === '' ? '' : String(Number(payload.qty || 1) * Number(payload.valueGp));
      row['Faction Relevance'] = payload.factionRelevance || '';
      row['Notes']             = payload.notes || '';
    }

    function updateInventoryRowFromServer(item) {
      const id = item && item['Inventory ID'];
      if (!id) return;

      const index = inventoryRows.findIndex(r => r['Inventory ID'] === id);
      if (index === -1) return;

      inventoryRows[index] = {
        ...inventoryRows[index],
        ...item
      };
    }

    function getDeleteTargetRowByRepresentativeId(representativeId, rollupKey) {
      if (rollupKey) {
        const matchingRows = inventoryRows.filter(row => getInventoryRollupKey(row) === rollupKey);
        if (matchingRows.length) {
          return matchingRows.find(row => toNumber(row['Qty'] || 0) > 1) || matchingRows[0];
        }
      }
      const index = getInventoryIndexById(representativeId);
      return index >= 0 ? inventoryRows[index] : null;
    }

    function handleInventoryDeleteActionById(inventoryId, rollupKey) {
      const row = getDeleteTargetRowByRepresentativeId(inventoryId, rollupKey);
      if (!row || !row['Inventory ID']) return;

      const wrapper = document.querySelector(`.inventory-row[data-representative-id="${escapeSelectorValue(inventoryId)}"]`);
      const button = wrapper ? wrapper.querySelector('.inventory-delete-action') : null;
      if (button) {
        button.textContent = 'Deleting…';
        button.classList.add('deleting');
        button.disabled = true;
      }

      deleteSelectedInventory(row['Inventory ID'], { decrementOnly: true });
    }

    function deleteSelectedInventory(inventoryIdFromCard, options) {
      const opts = options || {};
      const inventoryId   = inventoryIdFromCard || document.getElementById('editInventoryId').value;
      const detailButton  = document.getElementById('deleteInventoryButton');
      const status        = getEditStatusElement();
      const existingRow   = inventoryRows.find(r => r['Inventory ID'] === inventoryId);
      const currentQty    = toNumber(existingRow && existingRow['Qty']);
      const shouldDecrement = Boolean(opts.decrementOnly && currentQty > 1);

      if (!inventoryId) {
        status.innerHTML = '<span class="error">No item selected.</span>';
        return;
      }

      if (detailButton) detailButton.disabled = true;
      document.getElementById('inventoryStatus').classList.remove('centered');
      document.getElementById('inventoryStatus').textContent = shouldDecrement ? 'Removing one…' : 'Deleting…';
      if (status) status.textContent = shouldDecrement ? 'Removing one…' : 'Deleting…';

      const previousRows = inventoryRows.slice();
      const deletedRow = existingRow;
      if (shouldDecrement) {
        inventoryRows = inventoryRows.map(row =>
          row['Inventory ID'] === inventoryId
            ? {
                ...row,
                'Qty': String(currentQty - 1),
                'Total Value GP': row['Value GP'] === '' || row['Value GP'] === null || row['Value GP'] === undefined
                  ? row['Total Value GP']
                  : String((currentQty - 1) * toNumber(row['Value GP']))
              }
            : row
        );
      } else {
        inventoryRows = inventoryRows.filter(r => r['Inventory ID'] !== inventoryId);
      }
      swipedInventoryId = '';
      closeInventoryPanels(false);
      renderInventory();
      document.getElementById('inventoryStatus').textContent = deletedRow
        ? `${shouldDecrement ? 'Removing one from' : 'Deleting'} ${deletedRow['Item'] || 'item'}…`
        : (shouldDecrement ? 'Removing one…' : 'Deleting…');

      const runner = google.script.run
        .withSuccessHandler(res => {
          if (detailButton) detailButton.disabled = false;
          if (!res || !res.ok) {
            inventoryRows = previousRows;
            renderInventory();
            document.getElementById('inventoryStatus').innerHTML = `<span class="error">${escapeHtml((res && res.error) || (shouldDecrement ? 'Remove failed.' : 'Delete failed.'))}</span>`;
            if (status) status.innerHTML = `<span class="error">${escapeHtml((res && res.error) || (shouldDecrement ? 'Remove failed.' : 'Delete failed.'))}</span>`;
            return;
          }
          bustInventoryCache();
          if (res.item) {
            updateInventoryRowFromServer(res.item);
          }
          document.getElementById('inventoryStatus').innerHTML = `<span class="success">${escapeHtml(res.message || (shouldDecrement ? 'Removed one.' : 'Deleted.'))}</span>`;
        })
        .withFailureHandler(err => {
          if (detailButton) detailButton.disabled = false;
          inventoryRows = previousRows;
          renderInventory();
          document.getElementById('inventoryStatus').innerHTML = `<span class="error">${escapeHtml((shouldDecrement ? 'Remove failed: ' : 'Delete failed: ') + (err.message || err))}</span>`;
          if (status) status.innerHTML = `<span class="error">${escapeHtml((shouldDecrement ? 'Remove failed: ' : 'Delete failed: ') + (err.message || err))}</span>`;
        });

      if (shouldDecrement) {
        runner.apiAdjustInventory({ itemId: inventoryId, delta: -1, note: 'Swipe remove one' });
      } else {
        runner.apiDeleteInventory(inventoryId);
      }
    }

    /* ── Add Item: search & select ───────────────────────────────── */
    function getEquipmentResultLimit() {
      return isMobileLayout() ? 8 : 80;
    }

    function loadEquipmentIndex(preloadOnly = false) {
      const status = document.getElementById('searchStatus');
      const shouldPaintSearchUi = !preloadOnly || commandMode === 'add';

      function maybePreloadNotes() {
        if (preloadOnly && !campaignNotesLoaded && !campaignNotesLoading) {
          checkCampaignNotesAccess(false, access => {
            if (access.allowed) {
              loadCampaignNotes(true);
            }
          });
        }
      }

      if (equipmentIndexLoading) {
        if (shouldPaintSearchUi) {
          searchEquipment();
        }
        return;
      }

      if (equipmentIndexLoaded) {
        if (shouldPaintSearchUi) {
          searchEquipment();
        }
        maybePreloadNotes();
        return;
      }

      let paintedFromCache = false;

      if (!equipmentIndexLoaded) {
        const cachedRows = readEquipmentIndexCache();

        if (cachedRows.length) {
          equipmentIndex = cachedRows;
          equipmentIndexLoaded = true;
          paintedFromCache = true;
          if (shouldPaintSearchUi) {
            status.classList.remove('centered');
            status.textContent = 'Refreshing library…';
            searchEquipment();
          }
        }
      }

      equipmentIndexLoading = true;

      if (shouldPaintSearchUi && !paintedFromCache && !equipmentIndexLoaded) {
        status.classList.add('centered');
        status.textContent = 'Loading library…';
        equipmentResults  = [];
        selectedEquipment = null;
        document.getElementById('searchResults').innerHTML = '';
        updateAddFlow();
      }

      google.script.run
        .withSuccessHandler(res => {
          equipmentIndexLoading = false;
          if (!res || !res.ok) {
            if (!equipmentIndex.length) {
              if (shouldPaintSearchUi) {
                status.innerHTML = `<span class="error">${escapeHtml((res && res.error) || 'Library load failed.')}</span>`;
              }
            } else {
              if (shouldPaintSearchUi) {
                status.classList.remove('centered');
                status.textContent = 'Refresh failed — showing cached library.';
              }
            }
            return;
          }
          equipmentIndex = normalizeEquipmentIndexRows(res.rows || []);
          equipmentIndexLoaded = true;
          cacheEquipmentIndexRows(res.rows || []);
          if (shouldPaintSearchUi) {
            searchEquipment();
          }
          maybePreloadNotes();
        })
        .withFailureHandler(err => {
          equipmentIndexLoading = false;
          if (!equipmentIndex.length) {
            if (shouldPaintSearchUi) {
              status.innerHTML = `<span class="error">Load failed: ${escapeHtml(err.message || err)}</span>`;
            }
          } else {
            if (shouldPaintSearchUi) {
              status.classList.remove('centered');
              status.textContent = 'Refresh failed — showing cached library.';
            }
          }
          maybePreloadNotes();
        })
        .apiGetEquipmentIndex();
    }

    function debouncedSearchEquipment() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(searchEquipment, 80);
    }

    function searchEquipment() {
      const q      = document.getElementById('equipmentSearch').value.trim().toLowerCase();
      const status = document.getElementById('searchStatus');
      const limit  = getEquipmentResultLimit();

      if (!equipmentIndexLoaded) { loadEquipmentIndex(); return; }

      if (q.length < 2) {
        equipmentResults = QUICK_ADD_ITEMS.slice(0, Math.min(6, limit))
          .concat(equipmentIndex.slice(0, Math.max(0, limit - 6)));
        renderEquipmentResults(`Showing first ${equipmentResults.length} of ${equipmentIndex.length}`);
        return;
      }

      const quickMatches = getQuickAddMatches(q);
      const libraryMatches = equipmentIndex
        .filter(r => r.searchText.includes(q))
        .slice(0, Math.max(0, limit - quickMatches.length));

      equipmentResults = quickMatches.concat(libraryMatches);

      if (!equipmentResults.length) {
        status.classList.add('centered');
        status.textContent = 'No matches.';
        document.getElementById('searchResults').innerHTML = '';
        return;
      }

      renderEquipmentResults(`${equipmentResults.length} result${equipmentResults.length === 1 ? '' : 's'}`);
    }

    function getQuickAddMatches(query) {
      if (!query) return [];

      return QUICK_ADD_ITEMS
        .filter(item => {
          const haystack = [item.name, item.category, ...(item.terms || [])].join(' ').toLowerCase();
          return haystack.includes(query) || query.split(/\s+/).some(part => part.length > 1 && haystack.includes(part));
        })
        .slice(0, 5);
    }

    function renderEquipmentResults(message) {
      const status  = document.getElementById('searchStatus');
      const results = document.getElementById('searchResults');

      status.classList.remove('centered');
      status.textContent = message;

      results.innerHTML = equipmentResults.map((row, i) => {
        const name = escapeHtml(row.name || '');
        const meta = row.quickAdd
          ? ['Quick add', row.category || '', row.valueGp ? `${row.valueGp} gp each` : ''].filter(Boolean).join(' · ')
          : [row.category || row.type || '', row.rarity || ''].filter(Boolean).join(' · ');
        return `
          <div id="result_${i}" class="result-card" onclick="selectEquipmentResult(${i})">
            <div class="item-title">${name}</div>
            ${meta ? `<div class="item-meta">${escapeHtml(meta)}</div>` : ''}
          </div>`;
      }).join('');
    }

    function selectEquipmentResult(index) {
      const result = equipmentResults[index];
      if (!result) return;

      selectedEquipment = result;
      fillAddFormFromEquipment(selectedEquipment, false);

      document.querySelectorAll('.result-card').forEach(c => c.classList.remove('selected'));
      const card = document.getElementById(`result_${index}`);
      if (card) card.classList.add('selected');

      updateAddFlow();
      scrollAddDetailsIntoView();
      focusPrimaryAddField();
      if (!result.quickAdd) {
        loadSelectedDescription(true);
      }
    }

    function fillAddFormFromEquipment(item, includeDescription) {
      document.getElementById('libraryItemId').value  = item.quickAdd ? '' : (item.itemId || '');
      document.getElementById('quickAddKey').value    = item.quickAdd ? (item.quickKey || '') : '';
      document.getElementById('item').value           = item.name || '';
      document.getElementById('category').value       = item.category || item.type || '';
      document.getElementById('rarity').value         = item.rarity || '';
      document.getElementById('valueGp').value        = item.valueGp || '';

      if (includeDescription && item.description) {
        document.getElementById('notes').value = item.description.slice(0, 750);
      } else if (!includeDescription) {
        document.getElementById('notes').value = '';
      }

      document.getElementById('selectedName').textContent = item.name || '';
      document.getElementById('selectedMeta').textContent = [
        item.quickAdd ? 'Quick add' : '',
        item.category || item.type || '',
        item.rarity || ''
      ].filter(Boolean).join(' · ');

      const sizeField = document.getElementById('quickAddSizeField');
      const sizeSelect = document.getElementById('quickAddSize');
      const isDelerium = item.quickAdd && (item.category || '').toLowerCase() === 'delerium';
      sizeField.classList.toggle('active', Boolean(isDelerium));
      if (isDelerium) {
        const itemName = (item.name || '').toLowerCase();
        const selectedSize = itemName.includes('massive cluster') ? 'massive cluster'
          : (itemName.includes('geode') || itemName.includes('large')) ? 'geode'
          : itemName.includes('chip') ? 'chip'
          : itemName.includes('fragment') ? 'fragment'
          : itemName.includes('shard') ? 'shard'
          : itemName.includes('unknown') ? 'unknown'
          : 'crystal';
        sizeSelect.value = selectedSize;
      }

      document.getElementById('searchStatus').textContent = 'Item selected.';
      document.getElementById('selectedCardName').textContent = item.name || '';
      document.getElementById('selectedCardMeta').textContent = [
        item.quickAdd ? 'Quick add' : '',
        item.category || item.type || '',
        item.rarity || ''
      ].filter(Boolean).join(' · ');
      document.getElementById('addStatus').innerHTML =
        item.quickAdd
          ? `<span class="success">Quick adding: ${escapeHtml(item.name || '')}</span>`
          : `<span class="success">Reviewing: ${escapeHtml(item.name || '')}</span>`;
    }

    function isQuickAddItem(item) {
      return Boolean(item && item.quickAdd);

    function isCustomItem(item) {
      return Boolean(item && item.custom);

    /* ── Add flow: step visibility ───────────────────────────────── */
    function updateAddFlow() {
      const selectedCard  = document.getElementById('selectedItemCard');
      const detailsCard   = document.getElementById('addDetailsCard');
      const searchCard    = document.getElementById('addSearchCard');
      const mobile        = isMobileLayout();

      if (selectedEquipment) {
        selectedCard.classList.add('active');
        detailsCard.classList.toggle('quick-add-mode', isQuickAddItem(selectedEquipment));
        detailsCard.classList.toggle('custom-mode', isCustomItem(selectedEquipment));
        detailsCard.style.display = 'block';
        searchCard.style.display = mobile ? 'none' : 'block';
      } else {
        selectedCard.classList.remove('active');
        detailsCard.classList.remove('quick-add-mode');
        detailsCard.classList.remove('custom-mode');
        detailsCard.style.display = mobile ? 'none' : 'block';
        searchCard.style.display = 'block';
      }
    }

    /* ── Add Item: description load & submit ─────────────────────── */
    function loadSelectedDescription(silent = false) {
      if (selectedEquipment && selectedEquipment.quickAdd) return;
      if (!selectedEquipment || !selectedEquipment.itemId) return;

      const status          = document.getElementById('addStatus');
      const requestedItemId = selectedEquipment.itemId;

      if (!silent) {
        status.textContent = 'Loading…';
      }

      google.script.run
        .withSuccessHandler(res => {
          if (!selectedEquipment || selectedEquipment.itemId !== requestedItemId) return;
          if (!res || !res.ok || !res.item) {
            document.getElementById('searchStatus').innerHTML =
              `<span class="error">${escapeHtml((res && res.error) || 'Could not load details.')}</span>`;
            return;
          }
          selectedEquipment = res.item;
          fillAddFormFromEquipment(selectedEquipment, true);
          status.innerHTML = silent
            ? `<span class="success">Ready to review: ${escapeHtml(selectedEquipment.name || '')}</span>`
            : '<span class="success">Description loaded.</span>';
        })
        .withFailureHandler(err => {
          if (!selectedEquipment || selectedEquipment.itemId !== requestedItemId) return;
          status.innerHTML = `<span class="error">Failed: ${escapeHtml(err.message || err)}</span>`;
        })
        .apiGetEquipmentItem(requestedItemId);
    }

    function addInventoryItem() {
      const status   = document.getElementById('addStatus');
      const itemName  = document.getElementById('item').value.trim();
      const quickKey  = document.getElementById('quickAddKey').value.trim();

      if (!itemName) {
        status.innerHTML = '<span class="error">Enter or select an item first.</span>';
        return;
      }

      const payload = {
        libraryItemId:    document.getElementById('libraryItemId').value,
        item:             itemName,
        category:         document.getElementById('category').value,
        rarity:           document.getElementById('rarity').value,
        qty:              document.getElementById('qty').value,
        holder:           document.getElementById('holder').value,
        valueGp:          document.getElementById('valueGp').value,
        factionRelevance: document.getElementById('factionRelevance').value,
        notes:            document.getElementById('notes').value,
      };
      const isQuickAdd = Boolean(quickKey);
      const isCustomAdd = isCustomItem(selectedEquipment);
      const payloadSnapshot = { ...payload };
      const selectedSnapshot = selectedEquipment ? { ...selectedEquipment } : null;

      status.textContent = 'Adding…';
      setMainStatus(`<span class="success">Adding ${escapeHtml(itemName)}… syncing in background.</span>`);
      clearAddForm();
      setCommandMode('inventory');

      const runner = google.script.run
        .withSuccessHandler(res => {
          if (!res || !res.ok) {
            setMainStatus(`<span class="error">${escapeHtml((res && res.error) || `Failed to add ${itemName}.`)}</span>`);
            return;
          }
          if (res.ledgerEntry) {
            inventoryResourceLedger = [res.ledgerEntry, ...(inventoryResourceLedger || [])].slice(0, 60);
          }
          const cachePrimed = primeInventoryCacheAfterAdd(res.item);
          if (!cachePrimed) {
            bustInventoryCache();
          }
          if (commandMode === 'inventory') {
            renderInventory();
          }
          setMainStatus(`<span class="success">${escapeHtml(res.message || `${itemName} added.`)}</span>`);
          const duplicateCandidate = findDuplicateInventoryCandidate(res.item);
          if (duplicateCandidate) {
            showCombineChoice(res.item, duplicateCandidate);
          }
        })
        .withFailureHandler(err => {
          setMainStatus(`<span class="error">Add failed: ${escapeHtml(err.message || err)}</span>`);
          if (commandMode !== 'add') {
            selectedEquipment = selectedSnapshot;
            if (selectedSnapshot) {
              fillAddFormFromEquipment(selectedSnapshot, false);
            }
            document.getElementById('libraryItemId').value = payloadSnapshot.libraryItemId || '';
            document.getElementById('quickAddKey').value = quickKey;
            document.getElementById('item').value = payloadSnapshot.item || '';
            document.getElementById('category').value = payloadSnapshot.category || '';
            document.getElementById('rarity').value = payloadSnapshot.rarity || '';
            document.getElementById('qty').value = payloadSnapshot.qty || 1;
            document.getElementById('holder').value = payloadSnapshot.holder || '';
            document.getElementById('valueGp').value = payloadSnapshot.valueGp || '';
            document.getElementById('factionRelevance').value = payloadSnapshot.factionRelevance || '';
            document.getElementById('notes').value = payloadSnapshot.notes || '';
            document.getElementById('addStatus').innerHTML = `<span class="error">Add failed: ${escapeHtml(err.message || err)}</span>`;
            updateAddFlow();
          }
        });

      if (isQuickAdd) {
        runner.apiQuickAddInventory({
          quickKey,
          qty: payload.qty,
          holder: payload.holder,
          valueGp: payload.valueGp,
          factionRelevance: payload.factionRelevance,
          notes: payload.notes,
          size: document.getElementById('quickAddSizeField').classList.contains('active')
            ? document.getElementById('quickAddSize').value
            : ''
        });
      } else if (isCustomAdd) {
        runner.apiAddCustomInventory(payload);
      } else {
        runner.apiAddInventory(payload);
      }
    }

    function clearAddForm(options = {}) {
      const preserveCommandSearch = Boolean(options.preserveCommandSearch);
      const skipSearchReload = Boolean(options.skipSearchReload);
      const skipScrollReset = Boolean(options.skipScrollReset);
      addFormInteractionPrimed = false;
      selectedEquipment = null;
      equipmentResults  = [];

      ['equipmentSearch','libraryItemId','quickAddKey','item','category','rarity',
       'holder','valueGp','factionRelevance','notes'].forEach(id => {
        document.getElementById(id).value = '';
      });
      if (commandMode === 'add' && !preserveCommandSearch) {
        document.getElementById('commandSearch').value = '';
        handleSearchInput('commandSearch');
      }
      document.getElementById('qty').value = 1;
      document.getElementById('quickAddSizeField').classList.remove('active');
      document.getElementById('addDetailsCard').classList.remove('quick-add-mode');
      document.getElementById('addDetailsCard').classList.remove('custom-mode');
      document.getElementById('searchResults').innerHTML = '';
      document.getElementById('searchStatus').classList.add('centered');
      document.getElementById('searchStatus').textContent = '';
      document.getElementById('addStatus').textContent    = '';
      handleSearchInput('equipmentSearch');
      updateAddFlow();

      if (!skipSearchReload) {
        if (equipmentIndexLoaded) {
          searchEquipment();
        } else if (!equipmentIndexLoading) {
          loadEquipmentIndex();
        }
      }

      if (!skipScrollReset) {
        window.setTimeout(() => {
          const searchResults = document.getElementById('searchResults');
          const searchCard = document.getElementById('addSearchCard');
          if (searchResults) searchResults.scrollTop = 0;
          if (searchCard) searchCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 40);
      }
    }

    /* ── Utility ─────────────────────────────────────────────────── */
    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&',  '&amp;')
        .replaceAll('<',  '&lt;')
        .replaceAll('>',  '&gt;')
        .replaceAll('"',  '&quot;')
        .replaceAll("'",  '&#039;');
    }

    function escapeJsString(value) {
      return String(value ?? '')
        .replaceAll('\\', '\\\\')
        .replaceAll("'", "\\'");
    }

    /* ── Global event listeners ──────────────────────────────────── */
    document.addEventListener('click', e => {
      if (!e.target.closest('.inventory-row') && swipedInventoryId) {
        swipedInventoryId        = '';
        renderInventory();
      }
    });

    document.addEventListener('focusin', e => {
      updateAddFormInteractionState(e.target);
    });

    (function initDescriptionSheetSwipeClose() {
      const sheet = document.getElementById('descriptionSheet');
      const panel = sheet ? sheet.querySelector('.mobile-sheet-panel') : null;
      if (!sheet || !panel) return;

      let startY = 0;
      let startX = 0;

      panel.addEventListener('touchstart', e => {
        const touch = e.changedTouches[0];
        startY = touch.clientY;
        startX = touch.clientX;
      }, { passive: true });

      panel.addEventListener('touchend', e => {
        const touch = e.changedTouches[0];
        const dy = touch.clientY - startY;
        const dx = Math.abs(touch.clientX - startX);

        if (dy > 70 && dx < 40) {
          closeDescriptionSheet();
        }
      }, { passive: true });
    })();

    window.addEventListener('resize', () => {
      updatePhoneClass();
      setInventoryEditorOpen(false);
      closeDescriptionSheet();
      updateAddFlow();
      setCommandMode(commandMode);
      syncModalOpenState();
    });

    /* ── Boot ────────────────────────────────────────────────────── */
    updatePhoneClass();
    setCommandMode('inventory');
    updateAddFlow();
    loadCharacters();
    loadEquipmentIndex(true);
  </script>

</body>
</html>
