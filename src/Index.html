<!DOCTYPE html>
<html class="app-booting">
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <?!= include_('Wallpaper'); ?>

  <style>
    /* ─── Design tokens ─────────────────────────────────────────── */
    :root {
      color-scheme: dark;

      --bg:            #0b1120;
      --panel:         #19253d;
      --panel-strong:  #212f4b;
      --border:        #3d4f72;
      --border-strong: #5c739e;
      --text:          #f8fafc;
      --text-secondary:#d7e1f3;
      --text-muted:    #9fb1cf;
      --placeholder:   #8ea0be;
      --accent:        #a855f7;
      --danger:        #ef4444;
      --success:       #4ade80;
      --shadow:        0 18px 40px rgba(2,6,23,.28);
      --safe-top:      env(safe-area-inset-top,  0px);
      --safe-bottom:   env(safe-area-inset-bottom, 0px);

      --font-body:  16px;
      --font-label: 14px;
      --font-title: 20px;
      --font-meta:  15px;

      --radius-card:    18px;
      --radius-control: 16px;
      --radius-pill:    999px;

      --input-height:      52px;
      --textarea-height:  120px;
      --button-height:     52px;
      --nav-button-height: 56px;
      --nav-height:        84px;
      --keyboard-offset:   0px;
    }

    /* ─── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: rgba(168,85,247,.18);
    }

    html {
      width: 100%; max-width: 100%; min-height: 100%;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      background: #070b16;
    }

    html::before,
    html::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      transition: opacity 700ms ease, filter 700ms ease;
    }

    html::before {
      z-index: -2;
      background-image: var(--app-wallpaper);
      background-position: center 24%;
      background-size: cover;
      background-repeat: no-repeat;
      filter: brightness(1.3);
      opacity: 1;
    }

    html::after {
      z-index: -1;
      background-image:
        linear-gradient(180deg, rgba(6,9,18,.16) 0%, rgba(7,10,18,.28) 48%, rgba(4,6,12,.44) 100%),
        radial-gradient(circle at top, rgba(168,85,247,.14), transparent 34%);
      opacity: 1;
    }

    html.inventory-ready::before {
      filter: brightness(1.15);
    }

    html.inventory-ready::after {
      opacity: 1;
      background-image:
        linear-gradient(180deg, rgba(6,9,18,.34) 0%, rgba(7,10,18,.48) 48%, rgba(4,6,12,.66) 100%),
        radial-gradient(circle at top, rgba(168,85,247,.15), transparent 34%);
    }

    body {
      width: 100%; max-width: 100%; min-width: 0; min-height: 100vh;
      margin: 0; overflow-x: hidden;
      background: transparent;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: var(--font-body);
      line-height: 1.45;
      -webkit-text-size-adjust: 100%;
      position: relative;
    }

    body.app-modal-open { overflow: hidden; }

    .app-header,
    main,
    .bottom-nav {
      transition: opacity 520ms ease, transform 520ms ease;
    }

    html.app-booting .app-header,
    html.app-booting main,
    html.app-booting .bottom-nav {
      opacity: 0;
      transform: translateY(10px);
    }

    html.inventory-ready .app-header,
    html.inventory-ready main,
    html.inventory-ready .bottom-nav {
      opacity: 1;
      transform: translateY(0);
    }

    button, input, select, textarea {
      font: inherit; max-width: 100%;
      touch-action: manipulation;
    }

    button, .bottom-nav, .dashboard-stat, .inventory-card, .result-card, .group-toggle {
      -webkit-user-select: none;
      user-select: none;
    }

    button:focus-visible, input:focus-visible,
    select:focus-visible, textarea:focus-visible,
    .inventory-card:focus-visible, .result-card:focus-visible {
      outline: 3px solid rgba(203,155,255,.5);
      outline-offset: 2px;
    }

    .app, .app-shell, .main, .container,
    .panel, .card, .bottom-nav, .inventory-card, .result-card {
      width: 100%; max-width: 100%; min-width: 0;
    }

    /* ─── Header ─────────────────────────────────────────────────── */
    header {
      padding: calc(14px + var(--safe-top)) 14px 10px;
      background: rgba(10,16,31,.94);
      border-bottom: 1px solid rgba(92,115,158,.35);
    }

    .header-shell { display: flex; flex-direction: column; gap: 4px; }

    h1, .app-title {
      margin: 0;
      font-size: 28px; font-weight: 900;
      line-height: 1.1; letter-spacing: -.01em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: 12px; line-height: 1.2;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 22;
      padding: 10px 14px 8px;
      background: rgba(10,16,31,.96);
      border-bottom: 1px solid rgba(92,115,158,.26);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .app-header-title {
      display: none;
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 900;
      line-height: 1.05;
      color: var(--text);
    }

    .app-header.inventory-mode .app-header-title {
      display: block;
    }

    .search-bar-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      align-items: center;
    }

    .mode-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .mode-pill {
      flex: 1;
      min-height: 36px;
      padding: 6px 10px;
      border: 1px solid rgba(94,118,164,.5);
      border-radius: var(--radius-pill);
      background: #25324c;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
    }

    .mode-pill.active {
      background: linear-gradient(135deg, #9333ea, #a855f7 58%, #c084fc);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(168,85,247,.22);
    }

    .header-reload {
      width: 44px;
      min-width: 44px;
      height: 44px;
      min-height: 44px;
      padding: 0;
      border-radius: var(--radius-control);
      background: rgba(37,50,76,.8);
      border: 1px solid rgba(94,118,164,.4);
      color: var(--text-muted);
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }

    #mainStatus {
      margin: 0 0 6px;
      padding: 2px 0;
      font-size: 13px;
      color: var(--text-muted);
      min-height: 18px;
    }

    .mode-btn {
      min-height: 42px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 800;
    }

    .mode-btn.active {
      background: linear-gradient(135deg, #9333ea, #a855f7 58%, #c084fc);
      color: #fff;
      box-shadow: 0 6px 18px rgba(168,85,247,.22);
    }

    /* ─── Layout ─────────────────────────────────────────────────── */
    main {
      width: 100%; max-width: none;
      padding: 12px 14px calc(var(--nav-height) + var(--safe-bottom) + 28px);
    }

    .section { display: none; }
    .section.active { display: block; }

    .section-stack { display: grid; gap: 12px; }

    /* ─── Cards ──────────────────────────────────────────────────── */
    .card {
      background: linear-gradient(180deg, rgba(28,40,66,.98), rgba(20,29,49,.99));
      border: 1px solid rgba(92,115,158,.5);
      border-radius: var(--radius-card);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .card.featured {
      background:
        linear-gradient(180deg, rgba(35,49,79,.99), rgba(23,31,52,.99)),
        linear-gradient(135deg, rgba(168,85,247,.14), transparent 45%);
    }

    .section-heading {
      margin: 0;
      font-size: 22px; font-weight: 800; line-height: 1.2;
    }

    /* ─── Forms ──────────────────────────────────────────────────── */
    label {
      display: block; margin: 0 0 6px;
      color: var(--text-secondary);
      font-size: 15px; font-weight: 700; letter-spacing: .01em;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .sr-only-field {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .field { display: grid; gap: 6px; min-width: 0; }

    .field + .field,
    .row  + .field,
    .field + .row { margin-top: 14px; }

    .row, .details-grid, .item-grid, .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px; margin-top: 14px;
    }

    input, select, textarea {
      width: 100%;
      min-height: var(--input-height);
      padding: 14px 15px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-control);
      background: rgba(9,14,28,.94);
      color: var(--text);
      font-size: 18px; line-height: 1.35;
    }

    input::placeholder, textarea::placeholder {
      color: var(--placeholder); opacity: 1; font-size: 17px;
    }

    textarea { min-height: var(--textarea-height); resize: vertical; }

    button {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; min-height: var(--button-height);
      padding: 12px 14px;
      border: 1px solid transparent; border-radius: 16px;
      background: var(--panel-strong);
      color: var(--text);
      font-size: 18px; font-weight: 800; line-height: 1.1;
      cursor: pointer;
    }

    button.primary {
      background: linear-gradient(135deg, #9333ea, #a855f7 58%, #c084fc);
      color: #fff;
    }

    button.secondary {
      background: #25324c;
      border-color: rgba(94,118,164,.5);
    }

    button.danger {
      background: #6f1d1b;
      border-color: rgba(248,113,113,.26);
    }

    button:disabled { opacity: .5; cursor: not-allowed; }

    /* ─── Status ─────────────────────────────────────────────────── */
    .status {
      margin-top: 10px;
      color: var(--text-secondary);
      font-size: 15px; line-height: 1.45;
    }

    .status.centered {
      text-align: center; padding: 14px;
      border-radius: 16px;
      background: rgba(17,25,44,.62);
      border: 1px dashed rgba(94,118,164,.38);
    }

    .error   { color: #fda4af; }
    .success { color: #86efac; }

    /* ─── Inventory rows / swipe ─────────────────────────────────── */
    .inventory-row {
      position: relative;
      margin-bottom: 7px;
      border-radius: 18px;
      overflow: hidden;
    }

    /* The card slides left via JS inline transform (live drag) */
    .inventory-card {
      position: relative; z-index: 2; margin: 0;
      cursor: pointer;
      will-change: transform;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
      /* transform controlled by JS; don't add a transition here so drag feels immediate */
      min-height: 0; padding: 10px 12px;
      background: linear-gradient(180deg, rgba(14,21,36,.99), rgba(17,25,44,.99));
      border: 1px solid rgba(70,86,119,.8);
      border-radius: 18px;
    }

    /* snap-back / snap-open are added by JS */
    .inventory-card.snap {
      transition: transform 220ms cubic-bezier(.22,1,.36,1),
                  border-color 160ms ease, background 160ms ease;
    }

    .inventory-card.selected {
      border-color: rgba(203,155,255,.88);
      background:
        linear-gradient(180deg, rgba(57,34,91,.98), rgba(39,28,65,.98)),
        linear-gradient(135deg, rgba(192,132,252,.18), transparent 48%);
      box-shadow: 0 0 0 3px rgba(192,132,252,.18);
    }

    /* delete action revealed behind card */
    .inventory-delete-action {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 30%; min-width: 168px; max-width: 240px; min-height: 0 !important; height: 100%;
      padding: 0 8px;
      border-radius: 0;
      background: linear-gradient(180deg, #991b1b, #7f1d1d);
      color: #fff; z-index: 1;
      font-size: 16px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      border: none;
      transition: background 160ms ease;
    }

    .inventory-delete-action.deleting {
      background: linear-gradient(180deg, #7f1d1d, #450a0a);
      opacity: .9;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .dashboard-stat {
      padding: 14px;
      border: 1px solid rgba(94,118,164,.48);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(35,49,79,.92), rgba(17,25,44,.98));
      cursor: pointer;
      text-align: left;
      width: 100%;
    }

    .dashboard-value {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }

    .dashboard-label {
      margin-top: 6px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 800;
    }

    .resource-breakout {
      grid-column: 1 / -1;
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(94,118,164,.44);
      border-radius: 18px;
      background: rgba(9,14,28,.82);
    }

    .resource-lines {
      display: grid;
      gap: 8px;
    }

    .resource-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--text-secondary);
      font-weight: 750;
    }

    .resource-pay {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }

    .resource-pay button {
      width: auto;
      min-width: 104px;
    }

    .resource-undo {
      display: grid;
      gap: 8px;
      padding-top: 4px;
    }

    .resource-ledger {
      display: grid;
      gap: 6px;
      padding-top: 2px;
    }

    .resource-ledger-title {
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 850;
    }

    .resource-ledger-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      min-height: 34px;
      padding: 7px 9px;
      border: 1px solid rgba(70,86,119,.44);
      border-radius: 12px;
      background: rgba(9,14,28,.72);
      color: var(--text-secondary);
      font-size: 14px;
    }

    .resource-ledger-delta {
      font-weight: 900;
      color: var(--success);
    }

    .resource-ledger-delta.negative {
      color: #fca5a5;
    }

    .resource-ledger-date {
      color: var(--text-muted);
      text-align: right;
      white-space: nowrap;
    }

    .inventory-group {
      margin-bottom: 10px;
      border: 1px solid rgba(70,86,119,.8);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(14,21,36,.72);
    }

    .group-toggle {
      justify-content: space-between;
      gap: 12px;
      min-height: 62px;
      border-radius: 0;
      background: rgba(33,47,75,.94);
      border: 0;
    }

    .group-count {
      color: var(--text-secondary);
      font-size: 15px;
    }

    .group-list {
      display: grid;
      gap: 1px;
      padding: 6px;
    }

    .ledger-item {
      min-height: 58px;
      padding: 12px 14px;
      border: 1px solid rgba(70,86,119,.54);
      border-radius: 14px;
      background: rgba(9,14,28,.9);
      text-align: left;
      justify-content: flex-start;
    }

    .group-list .inventory-row {
      margin-bottom: 6px;
    }

    .ledger-item-name {
      font-size: 17px;
      font-weight: 850;
    }

    .description-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    /* ─── Result cards ───────────────────────────────────────────── */
    .result-card {
      position: relative; z-index: 2; margin: 0; cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease,
                  background 160ms ease, box-shadow 160ms ease;
      min-height: 72px; padding: 14px;
      background: linear-gradient(180deg, rgba(19,29,50,.99), rgba(22,33,55,.99));
      border: 1px solid rgba(70,86,119,.8);
      border-radius: 18px;
    }

    .result-card.selected {
      border-color: rgba(203,155,255,.88);
      background:
        linear-gradient(180deg, rgba(57,34,91,.98), rgba(39,28,65,.98)),
        linear-gradient(135deg, rgba(192,132,252,.18), transparent 48%);
      box-shadow: 0 0 0 3px rgba(192,132,252,.18);
    }

    /* ─── Item typography ────────────────────────────────────────── */
    .item-title {
      margin: 0; font-size: 19px; font-weight: 900;
      line-height: 1.16; color: var(--text);
    }

    .item-meta {
      margin-top: 3px; color: var(--text-secondary);
      font-size: 15px; line-height: 1.25;
    }

    /* ─── Pills ──────────────────────────────────────────────────── */
    .pill {
      display: inline-flex; align-items: center;
      min-height: 30px; padding: 6px 10px;
      border: 1px solid rgba(94,118,164,.55);
      border-radius: var(--radius-pill);
      background: rgba(8,13,26,.92);
      color: var(--text-secondary);
      font-size: 14px; line-height: 1; white-space: nowrap;
    }

    /* ─── Search results list ────────────────────────────────────── */
    .results-list {
      display: grid; gap: 8px;
      max-height: 40vh; overflow-y: auto;
      margin-top: 10px; padding-right: 2px;
    }

    /* ─── Add flow: selected-item card ──────────────────────────── */
    .selected-item-card { display: none; margin-top: 12px; }
    .selected-item-card.active { display: block; }

    .selected-item-actions { display: grid; gap: 10px; margin-top: 12px; }

    /* ─── Quick edit ─────────────────────────────────────────────── */
    .quick-editor { display: none; }
    .quick-editor.active { display: block; }

    .quick-summary {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
      padding: 12px;
      border: 1px solid rgba(94,118,164,.45);
      border-radius: 16px;
      background: rgba(8,13,26,.7);
    }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .quick-actions .primary,
    .quick-actions .wide {
      grid-column: 1 / -1;
    }

    .quick-size-field { display: none; }
    .quick-size-field.active { display: grid; }

    .quick-add-hidden { display: block; }
    .add-details-card.quick-add-mode .quick-add-hidden { display: none; }
    .add-details-card.quick-add-mode .item-grid {
      grid-template-columns: 1fr;
    }

    .custom-actions {
      margin-top: 10px;
    }

    .add-details-card.custom-mode .custom-name-field {
      position: static;
      width: 100%;
      height: auto;
      padding: 0;
      margin: 0;
      overflow: visible;
      clip: auto;
      white-space: normal;
      border: 0;
    }

    .description-text {
      white-space: pre-wrap;
      color: var(--text-secondary);
      font-size: 16px;
      line-height: 1.5;
    }

    .notes-status-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 8px 12px;
      margin-bottom: 10px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .notes-editor {
      width: 100%;
      min-height: 72px;
      max-height: 140px;
      resize: none;
      line-height: 1.5;
      padding: 10px 52px 10px 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .notes-sheet-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    .notes-editor:focus,
    .notes-editor:focus-visible {
      outline: none;
      box-shadow: none;
    }

    .notes-list {
      flex: 1;
      display: grid;
      align-content: end;
      gap: 10px;
      padding-bottom: 8px;
      overflow-y: auto;
      min-height: 0;
    }

    .notes-note {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      background: rgb(24, 36, 58);
      border: 1px solid rgba(92,115,158,.32);
      padding: 12px 14px;
      max-width: min(100%, 720px);
    }

    .notes-note-row {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
    }

    .notes-note-card {
      position: relative;
      z-index: 2;
      will-change: transform;
      transition: border-color 160ms ease, background 160ms ease;
    }

    .notes-note-card.snap {
      transition: transform 220ms cubic-bezier(.22,1,.36,1),
                  border-color 160ms ease, background 160ms ease;
    }

    .notes-edit-action,
    .notes-delete-action {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      border: 0;
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      white-space: nowrap;
      z-index: 1;
      border-radius: 0;
      opacity: 0;
      will-change: transform, opacity;
      transition: transform 200ms cubic-bezier(.22,1,.36,1), opacity 180ms ease;
    }

    .notes-edit-action {
      left: 0;
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
      transform: translateX(-18px) scale(.96);
    }

    .notes-delete-action {
      right: 0;
      background: linear-gradient(180deg, #991b1b, #7f1d1d);
      transform: translateX(18px) scale(.96);
    }

    .notes-note.pending {
      opacity: .72;
    }

    .notes-note.editing {
      border-color: rgba(96, 165, 250, .9);
      box-shadow: 0 0 0 2px rgba(96, 165, 250, .24);
    }

    .notes-note-meta {
      margin-bottom: 8px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .notes-note-body {
      white-space: pre-wrap;
      color: var(--text-secondary);
      line-height: 1.45;
    }

    .notes-composer {
      position: relative;
      border-top: 1px solid rgba(92,115,158,.22);
      padding-top: 6px;
    }


    .notes-sheet-actions {
      padding-bottom: calc(12px + var(--safe-bottom) + var(--keyboard-offset));
    }

    .notes-clear {
      position: absolute;
      top: 10px;
      right: 0;
      width: 38px;
      min-width: 38px;
      height: 38px;
      min-height: 38px;
      padding: 0;
      border-radius: 999px;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(37,50,76,.92);
      border: 1px solid rgba(94,118,164,.55);
      color: var(--text-secondary);
      font-size: 20px;
      line-height: 1;
    }

    .notes-clear.visible {
      display: inline-flex;
    }

    .notes-action-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    /* ─── Mobile sheet (full-screen edit panel) ──────────────────── */
    .mobile-sheet {
      position: fixed; inset: 0; z-index: 70;
      display: none;
      background: rgba(6,10,20,.76);
      backdrop-filter: blur(10px);
    }

    .mobile-sheet.active { display: block; }

    .mobile-sheet-panel {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(12,18,32,.99), rgba(11,16,28,1));
      display: flex; flex-direction: column;
    }

    .mobile-sheet-header {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: calc(10px + var(--safe-top)) 14px 10px;
      border-bottom: 1px solid rgba(92,115,158,.32);
      background: rgba(10,16,31,.96);
    }

    .mobile-sheet-title {
      min-width: 0; font-size: 20px; font-weight: 800; line-height: 1.2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .mobile-sheet-close {
      width: auto; min-width: 80px; min-height: 44px;
      padding: 10px 14px; font-size: 16px; border-radius: 14px;
    }

    .mobile-sheet-body {
      flex: 1; overflow-y: auto;
      padding: 14px 14px calc(110px + var(--safe-bottom));
    }

    .mobile-sheet-actions {
      position: sticky; bottom: 0;
      display: grid; gap: 10px;
      padding: 10px 14px calc(12px + var(--safe-bottom));
      background: rgba(10,16,31,.98);
      border-top: 1px solid rgba(92,115,158,.32);
    }

    /* ─── Desktop editor (hidden on mobile) ─────────────────────── */
    .desktop-editor { display: none; }

    /* ─── Search input ───────────────────────────────────────────── */
    .search-control {
      position: relative;
      width: 100%;
    }

    .search-input {
      min-height: 54px;
      font-size: 18px;
      padding-inline: 15px 58px;
    }

    .search-clear {
      position: absolute;
      top: 50%;
      right: 8px;
      width: 42px;
      min-width: 42px;
      min-height: 42px;
      height: 42px;
      padding: 0;
      transform: translateY(-50%);
      border-radius: 999px;
      background: rgba(37,50,76,.92);
      border: 1px solid rgba(94,118,164,.55);
      color: var(--text-secondary);
      font-size: 22px;
      line-height: 1;
      display: none;
      z-index: 3;
    }

    .search-clear.visible {
      display: inline-flex;
    }

    .legacy-search-card {
      display: none;
    }

    #addSearchCard .section-heading,
    #addSearchCard > .field:first-of-type {
      display: none;
    }

    /* ─── Bottom nav ─────────────────────────────────────────────── */
    .bottom-nav {
      position: fixed; left: 12px; right: 12px; bottom: 0;
      width: auto; z-index: 30;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; padding: 8px 8px calc(10px + var(--safe-bottom));
      background: rgba(8,12,24,.97); backdrop-filter: blur(16px);
      border: 1px solid rgba(76,97,136,.55);
      border-bottom: 0; border-radius: 18px 18px 0 0;
    }

    .bottom-nav button {
      min-height: var(--nav-button-height);
      font-size: 17px; border-radius: 14px;
      background: #25324c; border-color: rgba(94,118,164,.45);
      color: var(--text-secondary);
    }

    .bottom-nav button.active {
      background: linear-gradient(135deg, #9333ea, #a855f7 58%, #c084fc);
      color: #fff;
      box-shadow: 0 8px 24px rgba(168,85,247,.2);
    }

    .notes-shortcut .group-toggle {
      background: rgba(24, 36, 58, .92);
    }

    /* ─── Desktop (≥700px) ───────────────────────────────────────── */
    @media (min-width: 700px) {
      :root {
        --nav-height: 86px; --nav-button-height: 56px;
        --input-height: 52px; --button-height: 52px;
      }

      header {
        position: sticky; top: 0; z-index: 20;
        padding: calc(16px + var(--safe-top)) 20px 14px;
      }

      .subtitle { display: block; font-size: 14px; }

      h1, .app-title { font-size: clamp(2rem, 4vw, 2.45rem); white-space: normal; }

      main { max-width: 980px; margin: 0 auto; padding: 20px 20px calc(var(--nav-height) + var(--safe-bottom) + 28px); }

      .section-stack { gap: 16px; }
      .card { padding: 16px; }

      label { font-size: 14px; }

      input, select, textarea, button { font-size: 16px; }
      input::placeholder, textarea::placeholder { font-size: 16px; }

      .row, .details-grid, .item-grid, .form-grid { grid-template-columns: 1fr 1fr; }

      .desktop-editor { display: block; }
      .mobile-sheet { display: none !important; }
      #descriptionSheet.active { display: block !important; }
      #notesSheet.active { display: block !important; }

      .bottom-nav {
        left: 20px; right: 20px; max-width: 980px; margin: 0 auto;
        gap: 10px; padding: 10px 10px calc(10px + var(--safe-bottom));
        border-radius: 22px 22px 0 0;
      }

      .bottom-nav button { font-size: 16px; }

      .add-details-card { display: block !important; }
    }

    /* ─── Phone override — driven by DPR-scaled JS custom props ─── */
    /* All sizing lives here; media queries are dead in the AS webview */
    html.is-phone {
      -webkit-text-size-adjust: 100%;
    }

    html.is-phone,
    html.is-phone body {
      width: 100%; max-width: 100%; overflow-x: hidden;
      font-size: var(--phone-font-body, 28px);
      line-height: 1.32;
    }

    html.is-phone body {
      padding-bottom: calc(var(--phone-nav-height, 110px) + var(--safe-bottom) + 20px);
    }

    html.is-phone header:not(.app-header) {
      display: none;
      padding: 0;
    }

    html.is-phone .app-title,
    html.is-phone h1 {
      font-size: var(--phone-font-title, 32px);
      line-height: 1.05;
    }

    html.is-phone .subtitle { display: none; }

    html.is-phone main,
    html.is-phone .main,
    html.is-phone .app-shell,
    html.is-phone .container {
      padding-top: 8px;
      padding-left: 10px; padding-right: 10px;
      padding-bottom: calc(var(--phone-nav-height, 110px) + var(--safe-bottom) + 28px);
    }

    html.is-phone .section-stack { gap: 10px; }

    html.is-phone .card { padding: 14px; border-radius: 18px; }

    html.is-phone .section-heading {
      font-size: var(--phone-font-heading, 30px);
      line-height: 1.1; margin-bottom: 8px;
    }

    html.is-phone label {
      font-size: var(--phone-font-label, 20px);
      line-height: 1.2; margin-bottom: 8px;
    }

    html.is-phone input,
    html.is-phone select,
    html.is-phone textarea,
    html.is-phone button {
      font-size: var(--phone-font-body, 28px) !important;
      line-height: 1.2;
    }

    html.is-phone input,
    html.is-phone select {
      min-height: var(--phone-input-height, 68px);
      padding: 14px 16px;
    }

    html.is-phone textarea {
      min-height: calc(var(--phone-input-height, 68px) * 1.8);
      padding: 14px 16px;
    }

    html.is-phone input::placeholder,
    html.is-phone textarea::placeholder {
      font-size: var(--phone-font-meta, 22px);
    }

    html.is-phone button {
      min-height: var(--phone-button-height, 68px) !important;
      padding: 14px 18px; border-radius: 18px;
    }

    html.is-phone .row,
    html.is-phone .details-grid,
    html.is-phone .item-grid,
    html.is-phone .form-grid {
      grid-template-columns: 1fr; gap: 14px;
    }

    html.is-phone .inventory-card,
    html.is-phone .result-card {
      min-height: 0;
      padding: 12px 14px; border-radius: 18px;
    }

    html.is-phone .item-title,
    html.is-phone .result-card .item-title {
      font-size: var(--phone-font-item-title, 26px);
      line-height: 1.1;
    }

    html.is-phone .item-meta,
    html.is-phone .result-card .item-meta,
    html.is-phone .status {
      font-size: var(--phone-font-meta, 22px);
      line-height: 1.18;
    }

    html.is-phone .pill {
      font-size: var(--phone-font-meta, 22px);
      min-height: 36px;
    }

    html.is-phone .results-list {
      gap: 10px; max-height: 44vh;
    }

    html.is-phone .bottom-nav {
      left: 8px; right: 8px; bottom: 0;
      width: auto; max-width: none;
      padding: 8px 8px calc(10px + var(--safe-bottom));
    }

    html.is-phone .bottom-nav button {
      min-height: var(--phone-button-height, 68px) !important;
      font-size: var(--phone-font-meta, 22px) !important;
    }

    html.is-phone .app-header {
      padding: 8px 10px 8px;
    }

    html.is-phone .app-header-title {
      font-size: var(--phone-font-title, 32px);
      margin-bottom: 8px;
    }

    html.is-phone .mode-pill {
      min-height: calc(var(--phone-button-height, 68px) * 0.62);
      font-size: var(--phone-font-meta, 22px);
    }

    html.is-phone .search-input {
      min-height: var(--phone-input-height, 68px);
      padding-right: calc(var(--phone-button-height, 68px) + 16px);
    }

    html.is-phone .search-clear {
      width: calc(var(--phone-button-height, 68px) - 14px);
      min-width: calc(var(--phone-button-height, 68px) - 14px);
      height: calc(var(--phone-button-height, 68px) - 14px);
      min-height: calc(var(--phone-button-height, 68px) - 14px) !important;
      font-size: var(--phone-font-meta, 22px) !important;
      right: 8px;
    }

    html.is-phone .header-reload {
      width: var(--phone-input-height, 68px);
      min-width: var(--phone-input-height, 68px);
      height: var(--phone-input-height, 68px);
      min-height: var(--phone-input-height, 68px) !important;
      font-size: var(--phone-font-meta, 22px);
    }

    html.is-phone #mainStatus {
      font-size: var(--phone-font-meta, 22px);
    }

    html.is-phone .mobile-sheet-title {
      font-size: var(--phone-font-heading, 30px);
    }

    html.is-phone .mobile-sheet-close {
      min-height: var(--phone-button-height, 68px);
      font-size: var(--phone-font-meta, 22px);
    }

    html.is-phone .mobile-sheet-body {
      padding: 12px 12px calc(var(--phone-nav-height, 110px) + var(--safe-bottom) + 40px);
    }

    html.is-phone .mobile-sheet-actions {
      padding: 10px 12px calc(14px + var(--safe-bottom));
    }

    html.is-phone .quick-summary {
      padding: 14px;
      border-radius: 18px;
    }

    html.is-phone .quick-actions {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    html.is-phone .inventory-delete-action {
      font-size: var(--phone-font-meta, 22px);
      min-height: 0 !important;
      padding: 0 8px;
    }

    html.is-phone .dashboard-grid {
      gap: 8px;
    }

    html.is-phone .dashboard-value {
      font-size: var(--phone-font-heading, 30px);
    }

    html.is-phone .dashboard-label,
    html.is-phone .resource-line,
    html.is-phone .group-count,
    html.is-phone .ledger-item-name {
      font-size: var(--phone-font-meta, 22px);
    }

    html.is-phone .resource-pay {
      grid-template-columns: 1fr;
    }

    html.is-phone .group-toggle,
    html.is-phone .ledger-item {
      min-height: var(--phone-card-min-height, 88px);
    }

    html.is-phone .inventory-row {
      margin-bottom: 5px;
    }

    html.is-phone .resource-ledger-title,
    html.is-phone .resource-ledger-row {
      font-size: var(--phone-font-meta, 22px);
    }

    html.is-phone .resource-ledger-row {
      min-height: 0;
      padding: 8px 10px;
    }

    html.is-phone .description-text {
      font-size: var(--phone-font-meta, 22px);
      line-height: 1.38;
    }

    html.is-phone .notes-status-row {
      font-size: var(--phone-font-meta, 22px);
    }

    html.is-phone .notes-clear {
      width: 44px;
      min-width: 44px;
      height: 44px;
      min-height: 44px;
      font-size: var(--phone-font-meta, 22px);
    }

    html.is-phone .description-meta {
      gap: 10px;
      margin-bottom: 12px;
    }

    html.is-phone .inventory-row.swiped .inventory-card {
      /* override is handled via JS transform; this is the snap-open value */
    }
  </style>
</head>

<body class="app">
  <header id="appHeader" class="app-header inventory-mode">
    <div id="appHeaderTitle" class="app-header-title">Weiners of Drakkenheim</div>
    <div class="search-bar-row">
      <div class="search-control">
        <input id="commandSearch" class="search-input" placeholder="Filter inventory…" oninput="handleCommandSearchInput()" onfocus="handleCommandSearchFocus()">
        <button id="commandSearchClear" class="search-clear" type="button" aria-label="Clear search" onclick="clearCommandSearch()">×</button>
      </div>
    </div>
  </header>

  <main class="main app-shell">
    <div id="mainStatus" class="status"></div>

    <!-- ── Inventory tab ────────────────────────────────────────── -->
    <section id="inventorySection" class="section active">
      <div class="section-stack">

        <div class="card featured search-panel legacy-search-card">
          <h2 class="section-heading">Inventory</h2>
          <div class="field">
            <label class="sr-only" for="inventoryFilter">Filter inventory</label>
            <div class="search-control">
              <input id="inventoryFilter" class="search-input"
                     placeholder="Filter cloak, potion, shield…"
                     oninput="handleSearchInput('inventoryFilter'); renderInventory()">
              <button id="inventoryFilterClear" class="search-clear" type="button"
                      aria-label="Clear inventory filter"
                      onclick="clearSearchField('inventoryFilter', renderInventory)">×</button>
            </div>
          </div>
        </div>

        <div id="inventoryStatus" class="status centered">Loading…</div>
        <div id="inventoryList"></div>

        <!-- Desktop quick editor for currency / potions / delerium -->
        <div id="desktopQuickEditor" class="card quick-editor">
          <h2 class="section-heading" id="quickDesktopHeading">Quick Edit</h2>
          <div class="quick-summary">
            <div class="item-title" id="quickDesktopTitle"></div>
            <div class="item-meta" id="quickDesktopMeta"></div>
          </div>

          <div class="row details-grid">
            <div class="field">
              <label for="quickDesktopMode">Action</label>
              <select id="quickDesktopMode">
                <option value="add">Add</option>
                <option value="remove">Remove</option>
                <option value="set">Set total</option>
              </select>
            </div>
            <div class="field">
              <label for="quickDesktopAmount">Amount</label>
              <input id="quickDesktopAmount" type="number" min="0" step="1" inputmode="decimal">
            </div>
          </div>

          <div id="quickDesktopSizeField" class="field quick-size-field">
            <label for="quickDesktopSize">Delerium size</label>
            <select id="quickDesktopSize"></select>
          </div>

          <div class="field">
            <label for="quickDesktopNote">Note</label>
            <input id="quickDesktopNote" placeholder="Loot split, sale, used in session…">
          </div>

          <div class="quick-actions">
            <button class="primary" onclick="confirmQuickEdit()">Confirm</button>
            <button class="secondary" onclick="clearQuickEditFields()">Clear</button>
            <button class="secondary" onclick="openSelectedInventoryDescription()">Open Description</button>
            <button class="secondary" onclick="openFullEditorFromQuick()">Change Item</button>
            <button class="secondary" onclick="closeQuickEditPanel()">Cancel</button>
          </div>

          <div id="quickDesktopStatus" class="status"></div>
        </div>

        <!-- Desktop editor (hidden on phone) -->
        <div id="desktopInventoryEditor" class="card desktop-editor">
          <input type="hidden" id="editInventoryId">
          <input type="hidden" id="editLibraryItemId">

          <h2 class="section-heading" id="editTitle">Item Details</h2>

          <div class="field sr-only-field">
            <label class="sr-only" for="editItem">Item</label>
            <input id="editItem">
          </div>

          <div class="field">
            <label for="editNotes">Notes</label>
            <textarea id="editNotes"></textarea>
          </div>

          <div class="row details-grid">
            <div class="field">
              <label for="editQty">Qty</label>
              <input id="editQty" type="number" min="1" step="1">
            </div>
            <div class="field">
              <label for="editHolder">Holder</label>
            <select id="editHolder">
              <option value="">Party / shared</option>
            </select>
            </div>
          </div>

          <div class="row details-grid">
            <div class="field">
              <label for="editCategory">Category</label>
              <input id="editCategory">
            </div>
            <div class="field">
              <label for="editRarity">Rarity</label>
              <input id="editRarity">
            </div>
          </div>

          <div class="row details-grid">
            <div class="field">
              <label for="editValueGp">Value (gp)</label>
              <input id="editValueGp" type="number" min="0" step="0.01">
            </div>
            <div class="field">
              <label for="editFactionRelevance">Faction</label>
              <input id="editFactionRelevance">
            </div>
          </div>

          <div class="field">
            <button id="saveInventoryButton" class="primary" onclick="saveInventoryEdits()">Save Changes</button>
            <button class="secondary" onclick="openSelectedInventoryDescription()">Open Description</button>
            <button class="secondary" onclick="closeInventoryPanels()">Close</button>
            <button id="deleteInventoryButton" class="danger" onclick="deleteSelectedInventory()">Delete</button>
          </div>

          <div id="editStatusMessage" class="status"></div>
        </div>

      </div>
    </section>

    <!-- ── Add Item tab ─────────────────────────────────────────── -->
    <section id="addSection" class="section">
      <div class="section-stack">

        <!-- Step 1: Search (shown first on mobile; hidden after selection) -->
        <div id="addSearchCard" class="card featured search-panel">
          <h2 class="section-heading">Find Item</h2>
          <div class="field">
            <label class="sr-only" for="equipmentSearch">Search equipment library</label>
            <div class="search-control">
              <input id="equipmentSearch" class="search-input"
                     placeholder="Search cloak, potion, shield…"
                     oninput="handleSearchInput('equipmentSearch'); debouncedSearchEquipment()">
              <button id="equipmentSearchClear" class="search-clear" type="button"
                      aria-label="Clear equipment search"
                      onclick="clearSearchField('equipmentSearch', searchEquipment)">×</button>
            </div>
          </div>
          <div class="custom-actions">
            <button class="secondary" type="button" onclick="startCustomItem()">Custom / Homebrew Item</button>
          </div>
          <div id="searchStatus" class="status centered"></div>
          <div id="searchResults" class="results-list"></div>
        </div>

        <div id="selectedItemCard" class="card selected-item-card">
          <h2 class="section-heading">Selected</h2>
          <div class="item-title" id="selectedCardName"></div>
          <div class="item-meta" id="selectedCardMeta"></div>
          <div class="selected-item-actions">
            <button class="secondary" type="button" onclick="changeSelectedItem()">Change Item</button>
          </div>
        </div>

        <!-- Step 2: Details form -->
        <div id="addDetailsCard" class="card add-details-card" style="display:none;">
          <input type="hidden" id="libraryItemId">
          <input type="hidden" id="quickAddKey">

          <div class="item-title" id="selectedName">Item Details</div>
          <div class="item-meta quick-add-hidden" id="selectedMeta"></div>

          <div class="field sr-only-field custom-name-field">
            <label class="sr-only" for="item">Item Details</label>
            <input id="item" placeholder="Custom item name">
          </div>

          <div class="field quick-add-hidden">
            <label for="notes">Notes</label>
            <textarea id="notes" placeholder="What does it do? Who wants it?"></textarea>
          </div>

          <div class="row item-grid">
            <div class="field">
              <label for="qty">Qty</label>
              <input id="qty" type="number" min="1" value="1">
            </div>
            <div class="field sr-only-field">
              <label for="holder">Holder</label>
              <select id="holder">
                <option value="">Party / shared</option>
              </select>
            </div>
          </div>

          <div class="row item-grid quick-add-hidden">
            <div class="field">
              <label for="category">Category</label>
              <input id="category" placeholder="Magic Item, Gear…">
            </div>
            <div class="field">
              <label for="rarity">Rarity</label>
              <input id="rarity" placeholder="Common, Rare…">
            </div>
          </div>

          <div class="row item-grid quick-add-hidden">
            <div class="field sr-only-field">
              <label for="valueGp">Value (gp)</label>
              <input id="valueGp" type="number" min="0" step="0.01">
            </div>
            <div class="field">
              <label for="factionRelevance">Faction</label>
              <input id="factionRelevance" placeholder="Academy, Lanterns…">
            </div>
          </div>

          <div id="quickAddSizeField" class="field quick-size-field">
            <label for="quickAddSize">Delerium size</label>
            <select id="quickAddSize">
              <option value="chip">chip</option>
              <option value="fragment">fragment</option>
              <option value="shard">shard</option>
              <option value="crystal">crystal</option>
              <option value="geode">geode</option>
              <option value="massive cluster">massive cluster</option>
              <option value="unknown">unknown</option>
            </select>
          </div>

          <div id="addStatus" class="status"></div>
        </div>

      </div>
    </section>

  </main>

  <!-- ── Mobile sheet: edit existing inventory item ────────────── -->
  <div id="inventorySheet" class="mobile-sheet">
    <div class="mobile-sheet-panel">

      <div class="mobile-sheet-header">
        <div class="mobile-sheet-title" id="sheetEditTitle">Edit Item</div>
        <button class="secondary mobile-sheet-close" onclick="closeInventoryPanels()">Done</button>
      </div>

      <div class="mobile-sheet-body">

        <div class="field sr-only-field">
          <label class="sr-only" for="sheetEditItem">Item</label>
          <input id="sheetEditItem">
        </div>

        <div class="field">
          <label for="sheetEditNotes">Notes</label>

    function bustInventoryCache() {

    function getCachedInventoryRows() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return [];

        const cached = JSON.parse(raw);
        const rows = cached && cached.rows;
        const ts = Number(cached && cached.ts);

        if (Array.isArray(rows) && ts && Date.now() - ts < CACHE_MAX_AGE) {
          return rows;
        }
      } catch (_) {}

      return [];
    }

    function getCachedInventoryPayload() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;

        const cached = JSON.parse(raw);
        const rows = cached && cached.rows;
        const ts = Number(cached && cached.ts);

        if (Array.isArray(rows) && ts && Date.now() - ts < CACHE_MAX_AGE) {
          return {
            rows,
            resourceLedger: Array.isArray(cached.resourceLedger) ? cached.resourceLedger : []
          };
        }
      } catch (_) {}

      return null;
    }

    function populateCharacterSelectors() {
      const selects = ['holder', 'editHolder', 'sheetEditHolder'];
      const options = ['<option value="">Party / shared</option>', ...characterOptions.map(row => `<option value="${escapeHtml(row.character)}">${escapeHtml(row.character)}${row.player ? ` — ${escapeHtml(row.player)}` : ''}</option>` )];
      selects.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        const current = el.value || '';
        el.innerHTML = options.join('') + (current && !characterOptions.some(r => r.character === current) ? `<option value="${escapeHtml(current)}">${escapeHtml(current)} (existing)</option>` : '');
        el.value = current;
      });
    }

    function loadCharacters() {
      google.script.run.withSuccessHandler(res => {
        if (!res || !res.ok) return;
        characterOptions = Array.isArray(res.rows) ? res.rows : [];
        populateCharacterSelectors();
      }).apiGetCharacters();
    }

    function cacheInventoryRows(rows, resourceLedger) {
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({
          rows,
          resourceLedger: Array.isArray(resourceLedger) ? resourceLedger : inventoryResourceLedger,
          ts: Date.now()
        }));
      } catch (_) {}
    }

    function primeInventoryCacheAfterAdd(item) {
      if (!item || !item['Inventory ID']) return false;

      const baseRows = inventoryRows.length ? inventoryRows.slice() : getCachedInventoryRows();

      const exists = baseRows.some(row => row['Inventory ID'] === item['Inventory ID']);
      const rows = exists
        ? baseRows.map(row => row['Inventory ID'] === item['Inventory ID'] ? { ...row, ...item } : row)
        : [item, ...baseRows];

      inventoryRows = rows;
      cacheInventoryRows(rows);
      return true;
    }

    function toNumber(value) {
      const num = Number(value);
      return Number.isFinite(num) ? num : 0;
    }

    function normalizeEquipmentIndexRows(rows) {
      return (rows || []).map(row => ({
        ...row,
        searchText: String(row.name || '').toLowerCase()
      }));
    }

    function readEquipmentIndexCache() {
      try {
        const raw = localStorage.getItem(EQUIPMENT_CACHE_KEY);
        if (!raw) return [];

        const cached = JSON.parse(raw);
        const rows = cached && cached.rows;
        const ts = Number(cached && cached.ts);

        if (Array.isArray(rows) && rows.length && ts && Date.now() - ts < EQUIPMENT_CACHE_MAX_AGE) {
          return normalizeEquipmentIndexRows(rows);
        }
      } catch (_) {}

      return [];
    }

    function cacheEquipmentIndexRows(rows) {
      try {
        localStorage.setItem(EQUIPMENT_CACHE_KEY, JSON.stringify({
          rows,
          ts: Date.now()
        }));
      } catch (_) {}
    }

    function titleCase(value) {
      return String(value || '').replace(/\b\w/g, char => char.toUpperCase());
    }

    /* ── Phone detection & DPR-based scaling ─────────────────────── */
    function updatePhoneClass() {
      const isPhone = window.matchMedia('(max-width: 699px), (pointer: coarse)').matches;
      document.documentElement.classList.toggle('is-phone', isPhone);

      if (!isPhone) {
        // Reset phone vars so they don't bleed into desktop
        const root = document.documentElement;
        ['--phone-scale','--phone-font-body','--phone-font-label','--phone-font-title',
         '--phone-font-heading','--phone-font-item-title','--phone-font-meta',
         '--phone-input-height','--phone-button-height','--phone-card-min-height',
         '--phone-nav-height'].forEach(v => root.style.removeProperty(v));
        return false;
      }

      // iOS in Apps Script reports innerWidth ≈ 980 regardless of real screen size.
      // devicePixelRatio reliably tells us what we're actually rendering on.
      const dpr = window.devicePixelRatio || 1;
      // Typical iPhones: 2× (SE, older) or 3× (Pro). Clamp to [1.6 – 2.8].
      const scale = Math.max(1.6, Math.min(dpr, 2.8));

      const root = document.documentElement;
      root.style.setProperty('--phone-scale',          String(scale));
      root.style.setProperty('--phone-font-body',      `${Math.round(18 * scale)}px`);
      root.style.setProperty('--phone-font-label',     `${Math.round(14 * scale)}px`);
      root.style.setProperty('--phone-font-title',     `${Math.round(22 * scale)}px`);
      root.style.setProperty('--phone-font-heading',   `${Math.round(20 * scale)}px`);
      root.style.setProperty('--phone-font-item-title',`${Math.round(19 * scale)}px`);
      root.style.setProperty('--phone-font-meta',      `${Math.round(14 * scale)}px`);
      root.style.setProperty('--phone-input-height',   `${Math.round(52 * scale)}px`);
      root.style.setProperty('--phone-button-height',  `${Math.round(52 * scale)}px`);
      root.style.setProperty('--phone-card-min-height',`${Math.round(76 * scale)}px`);
      root.style.setProperty('--phone-nav-height',     `${Math.round(84 * scale)}px`);

      return true;
    }

    function isMobileLayout() {
      return document.documentElement.classList.contains('is-phone') || window.innerWidth < 700;
    }

    /* ── Swipe-to-delete ─────────────────────────────────────────── */
    const SWIPE_THRESHOLD = 46;   // minimum drag to commit open
    const SWIPE_VELOCITY  = 0.35; // px/ms threshold to commit on fast flick

    function getSwipeOpenPx() {
      return Math.max(168, Math.min(240, Math.round(window.innerWidth * 0.3)));
    }

    function bindInventoryRowGestures() {
      document.querySelectorAll('.inventory-row').forEach(row => {
        const card = row.querySelector('.inventory-card');
        if (!card) return;

        let startX   = 0;
        let startY   = 0;
        let startT   = 0;
        let currentX = 0;
        let dragging = false;
        let axisLocked = null; // 'h' | 'v' | null
        let pointerStartX = 0;
        let pointerStartY = 0;
        let pointerStartT = 0;
        let tapHandled = false;

        const inventoryId = () => row.dataset.inventoryId || '';
        const representativeId = () => row.dataset.representativeId || row.dataset.inventoryId || '';

        // Current resting offset for this card (0 = closed, negative = open)
        const restingOffset = () =>
          swipedInventoryId === inventoryId() ? -getSwipeOpenPx() : 0;

        function setTransform(x, animate) {
          card.classList.toggle('snap', animate);
          card.style.transform = x === 0 ? '' : `translateX(${x}px)`;
        }

        card.addEventListener('pointerdown', e => {
          if (e.button !== undefined && e.button !== 0) return;
          pointerStartX = e.clientX;
          pointerStartY = e.clientY;
          pointerStartT = Date.now();
          tapHandled = false;
        });

        card.addEventListener('pointerup', e => {
          if (e.button !== undefined && e.button !== 0) return;
          const dx = e.clientX - pointerStartX;
          const dy = e.clientY - pointerStartY;
          const elapsed = Date.now() - pointerStartT;
          const isOpen = swipedInventoryId === inventoryId();

          if (tapHandled) return;

          if (Math.abs(dx) < 24 && Math.abs(dy) < 24 && elapsed < 700 && !isOpen) {
            e.preventDefault();
            e.stopPropagation();
            tapHandled = true;
            openInventoryPrimaryActionById(representativeId());
          }
        });

        card.addEventListener('touchstart', e => {
          const t = e.changedTouches[0];
          startX   = t.clientX;
          startY   = t.clientY;
          startT   = Date.now();
          currentX = restingOffset();
          dragging = true;
          axisLocked = null;
          card.classList.remove('snap');
        }, { passive: true });

        card.addEventListener('touchmove', e => {
          if (!dragging) return;
          const t  = e.changedTouches[0];
          const dx = t.clientX - startX;
          const dy = t.clientY - startY;

          if (!axisLocked) {
            if (Math.abs(dx) > Math.abs(dy) + 4) axisLocked = 'h';
            else if (Math.abs(dy) > Math.abs(dx) + 4) axisLocked = 'v';
            else return;
          }

          if (axisLocked === 'v') return;

          // Clamp: can only drag left (to open) or back right (to close)
          const base    = restingOffset();
          const raw     = base + dx;
          const openPx  = getSwipeOpenPx();
          const clamped = Math.max(-openPx - 12, Math.min(8, raw));
          setTransform(clamped, false);
        }, { passive: true });

        card.addEventListener('touchend', e => {
          if (!dragging) return;
          dragging = false;

          const t       = e.changedTouches[0];
          const dx      = t.clientX - startX;
          const dy      = t.clientY - startY;
          const elapsed = Math.max(1, Date.now() - startT);
          const vel     = Math.abs(dx) / elapsed; // px/ms
          const base    = restingOffset();
          const id      = inventoryId();
          const openPx  = getSwipeOpenPx();

          const isOpen = swipedInventoryId === id;

          if (Math.abs(dx) < 22 && Math.abs(dy) < 22 && !isOpen) {
            tapHandled = true;
            openInventoryPrimaryActionById(representativeId());
            return;
          }

          let target;

          if (!isOpen) {
            // currently closed — commit open if dragged far enough or fast enough leftward
            if (dx < -SWIPE_THRESHOLD || (dx < -16 && vel > SWIPE_VELOCITY)) {
              swipedInventoryId        = id;
              target = -openPx;
            } else {
              target = 0;
            }
          } else {
            // currently open — commit close if dragged right far enough
            if (dx > SWIPE_THRESHOLD || (dx > 16 && vel > SWIPE_VELOCITY)) {
              swipedInventoryId        = '';
              target = 0;
            } else {
              target = -openPx;
            }
          }

          setTransform(target, true);

          // If state changed to open, re-render to show delete button underneath.
          // If we're just snapping back, no re-render needed — avoid flicker.
          if (target !== restingOffset()) {
            // small delay so snap animation is visible before re-render resets DOM
            setTimeout(() => renderInventory(), 230);
          }
        });
      });
    }

    /* ── Navigation ──────────────────────────────────────────────── */
    function setCommandMode(mode) {
      commandMode = mode === 'add' ? 'add' : 'inventory';
      const inventoryActive = commandMode === 'inventory';
      const addActive = !inventoryActive;
      const commandSearch = document.getElementById('commandSearch');
      const appHeader = document.getElementById('appHeader');

      document.getElementById('inventorySection').classList.toggle('active', inventoryActive);
      document.getElementById('addSection').classList.toggle('active', addActive);
      document.getElementById('inventoryTab').classList.toggle('active', inventoryActive);
      document.getElementById('addTab').classList.toggle('active', addActive);
      if (appHeader) {
        appHeader.classList.toggle('inventory-mode', inventoryActive);
      }

      commandSearch.placeholder = inventoryActive
        ? 'Filter inventory…'
        : 'Search equipment library…';

      commandSearch.value = inventoryActive
        ? document.getElementById('inventoryFilter').value
        : document.getElementById('equipmentSearch').value;

      handleSearchInput('commandSearch');

      if (inventoryActive) {
        addFormInteractionPrimed = false;
        loadInventory();
      } else {
        loadEquipmentIndex();
        updateAddFlow();
      }
    }

    function setMainStatus(html) {
      const el = document.getElementById('mainStatus');
      if (!el) return;
      el.innerHTML = html || '';
    }

    function handleCommandSearchInput() {
      const value = document.getElementById('commandSearch').value;

      if (commandMode === 'inventory') {
        document.getElementById('inventoryFilter').value = value;
        handleSearchInput('commandSearch');
        renderInventory();
        return;
      }

      if (selectedEquipment) {
        clearAddForm({
          preserveCommandSearch: true,
          skipSearchReload: true,
          skipScrollReset: true
        });
      }

      document.getElementById('equipmentSearch').value = value;
      handleSearchInput('commandSearch');
      debouncedSearchEquipment();
    }

    function clearCommandSearch() {
      document.getElementById('commandSearch').value = '';

      if (commandMode === 'inventory') {
        document.getElementById('inventoryFilter').value = '';
        handleSearchInput('commandSearch');
        renderInventory();
      } else {
        if (selectedEquipment) {
          clearAddForm({
            preserveCommandSearch: false,
            skipSearchReload: true,
            skipScrollReset: true
          });
        }
        document.getElementById('equipmentSearch').value = '';
        handleSearchInput('commandSearch');
        searchEquipment();
      }

      document.getElementById('commandSearch').focus();
    }

    function handleCommandSearchFocus() {
      if (commandMode !== 'add') return;
      if (!selectedEquipment) return;

      clearAddForm({
        preserveCommandSearch: true,
        skipSearchReload: true,
        skipScrollReset: true
      });
      document.getElementById('equipmentSearch').value = '';
      handleSearchInput('equipmentSearch');
      searchEquipment();
    }

    function getCampaignNotesDraft() {
      try {
        const raw = localStorage.getItem(NOTES_DRAFT_KEY);
        if (!raw) return null;
        const draft = JSON.parse(raw);
        if (draft && typeof draft.body === 'string') return draft;
      } catch (_) {}
      return null;
    }

    function cacheCampaignNotesDraft(body, editingId) {
      try {
        localStorage.setItem(NOTES_DRAFT_KEY, JSON.stringify({
          body: String(body || ''),
          editingId: editingId || '',
          ts: Date.now()
        }));
      } catch (_) {}
    }

    function clearCampaignNotesDraft() {
      try {
        localStorage.removeItem(NOTES_DRAFT_KEY);

    function updateCampaignNotesMeta() {
      const meta = document.getElementById('campaignNotesMeta');
      if (!meta) return;
      const parts = [];
      if (campaignNotes.length) {
        parts.push(`${campaignNotes.length} note${campaignNotes.length === 1 ? '' : 's'}`);
        if (campaignNotes[0].updatedAt) parts.push(`Latest ${formatShortDateTime(campaignNotes[0].updatedAt)}`);
      }
      meta.textContent = parts.join(' · ');

      if (!force && campaignNotesAccess && typeof callback === 'function') {
        callback(campaignNotesAccess);
        return;
      }

      google.script.run
        .withSuccessHandler(res => {
          const access = {
            allowed: Boolean(res && res.ok && res.allowed),
            message: (res && res.message) || 'Notes are under construction.'
          };
          campaignNotesAccess = access;
          if (typeof callback === 'function') callback(access);
        })
        .withFailureHandler(() => {
          const access = {
            allowed: false,
            message: 'Notes are under construction.'
          };
          campaignNotesAccess = access;
          if (typeof callback === 'function') callback(access);
        })
        .apiGetCampaignNotesAccess();

    function findDuplicateInventoryCandidate(newItem) {
      if (!newItem || !newItem['Inventory ID']) return null;
      const rollupKey = getInventoryRollupKey(newItem);
      return inventoryRows.find(row =>
        row['Inventory ID'] !== newItem['Inventory ID'] &&
        getInventoryRollupKey(row) === rollupKey

      pendingCombineChoice = {
        sourceId: newItem['Inventory ID'],
        targetId: existingItem['Inventory ID'],
        itemName: newItem['Item'] || existingItem['Item'] || 'Item',
        sourceQty: toNumber(newItem['Qty'] || 0),
        targetQty: toNumber(existingItem['Qty'] || 0)
      };

      document.getElementById('combineItemTitle').textContent = pendingCombineChoice.itemName;
      document.getElementById('combineItemMeta').textContent =
        `Existing: ${formatCount(pendingCombineChoice.targetQty)} · New: ${formatCount(pendingCombineChoice.sourceQty)}`;

      pendingCombineChoice = null;
      document.getElementById('combineSheet').classList.remove('active');

    function confirmCombineInventoryItem() {
      if (!pendingCombineChoice) return;
      const choice = { ...pendingCombineChoice };
      document.getElementById('combineStatus').textContent = 'Combining…';
      google.script.run
        .withSuccessHandler(res => {
          if (!res || !res.ok || !res.item) {
            document.getElementById('combineStatus').innerHTML = `<span class="error">${escapeHtml((res && res.error) || 'Combine failed.')}</span>`;
            return;
          }
          inventoryRows = inventoryRows
            .filter(row => row['Inventory ID'] !== choice.sourceId)
            .map(row => row['Inventory ID'] === choice.targetId ? { ...row, ...res.item } : row);
          cacheInventoryRows(inventoryRows, inventoryResourceLedger);
          renderInventory();
          setMainStatus(`<span class="success">${escapeHtml(res.message || 'Items combined.')}</span>`);
          keepDuplicateInventoryItem();

        .withFailureHandler(err => {
          document.getElementById('combineStatus').innerHTML = `<span class="error">Combine failed: ${escapeHtml(err.message || err)}</span>`;

        .apiCombineInventoryItems({

    function renderCampaignNotes() {
      const list = document.getElementById('campaignNotesList');
      if (!list) return;

      if (!campaignNotes.length) {
        list.innerHTML = '<div class="status centered">No notes yet.</div>';
        return;
      }

      const orderedNotes = campaignNotes.slice().sort((a, b) => {
        const aTime = new Date(a.createdAt || a.updatedAt || 0).getTime();
        const bTime = new Date(b.createdAt || b.updatedAt || 0).getTime();
        return aTime - bTime;
      });

      list.innerHTML = orderedNotes.map(note => `
        <div class="notes-note-row" data-note-id="${escapeHtml(note.noteId)}">

          <button class="notes-delete-action" type="button" onclick="event.stopPropagation(); deleteCampaignNote('${escapeJsString(note.noteId)}')" style="width:${NOTE_ACTION_WIDTH}px;">Delete</button>
          <div class="notes-note notes-note-card ${note._pending ? 'pending' : ''} ${campaignNoteEditingId === note.noteId ? 'editing' : ''}" data-note-id="${escapeHtml(note.noteId)}" ondblclick="event.stopPropagation(); startEditCampaignNote('${escapeJsString(note.noteId)}')">
            <div class="notes-note-meta">${escapeHtml(formatShortDateTime(note.updatedAt || note.createdAt))}${note.updatedBy ? ` · ${escapeHtml(note.updatedBy)}` : ''}</div>

    function scrollCampaignNotesToBottom() {

    function bindCampaignNoteGestures() {
      document.querySelectorAll('.notes-note-row').forEach(row => {
        const card = row.querySelector('.notes-note-card');
        if (!card) return;
        let startX = 0;
        let startY = 0;
        let dragging = false;
        let axisLocked = null;
        let triggered = false;

        function setNoteSwipeVisual(currentOffset, animate) {
          const editButton = row.querySelector('.notes-edit-action');
          const deleteButton = row.querySelector('.notes-delete-action');
          const clamped = Math.max(-NOTE_ACTION_MAX_DRAG, Math.min(NOTE_ACTION_MAX_DRAG, currentOffset));
          const revealOffset = Math.max(-NOTE_ACTION_WIDTH, Math.min(NOTE_ACTION_WIDTH, clamped));
          const editProgress = revealOffset > 0 ? Math.min(1, revealOffset / NOTE_ACTION_WIDTH) : 0;
          const deleteProgress = revealOffset < 0 ? Math.min(1, Math.abs(revealOffset) / NOTE_ACTION_WIDTH) : 0;

          card.classList.toggle('snap', animate);
          card.style.transform = clamped ? `translateX(${clamped}px)` : '';

          if (editButton) {
            editButton.style.opacity = String(editProgress);
            editButton.style.transform = `translateX(${Math.round(-18 * (1 - editProgress))}px) scale(${(0.96 + (0.04 * editProgress)).toFixed(3)})`;
          }
          if (deleteButton) {
            deleteButton.style.opacity = String(deleteProgress);
            deleteButton.style.transform = `translateX(${Math.round(18 * (1 - deleteProgress))}px) scale(${(0.96 + (0.04 * deleteProgress)).toFixed(3)})`;
          }
        }

        card.addEventListener('touchstart', e => {
          const touch = e.changedTouches[0];
          startX = touch.clientX;
          startY = touch.clientY;
          dragging = true;
          triggered = false;
          axisLocked = null;
          setNoteSwipeVisual(0, false);
        }, { passive: true });
        card.addEventListener('touchend', e => {
          if (!dragging) return;
          dragging = false;
          if (triggered) return;
          const touch = e.changedTouches[0];
          const dx = touch.clientX - startX;
          const dy = touch.clientY - startY;
          if (Math.abs(dy) > 40) return;
          if (Math.abs(dx) < 24 && Math.abs(dy) < 24) {
            setNoteSwipeVisual(0, true);
            return;
          }
          setNoteSwipeVisual(0, true);
        }, { passive: true });
        card.addEventListener('touchmove', e => {
          if (!dragging) return;
          const touch = e.changedTouches[0];
          const dx = touch.clientX - startX;
          const dy = touch.clientY - startY;
          if (!axisLocked) {
            if (Math.abs(dx) > Math.abs(dy) + 4) axisLocked = 'h';
            else if (Math.abs(dy) > Math.abs(dx) + 4) axisLocked = 'v';
            else return;
          }
          if (axisLocked === 'v') return;
          const liveOffset = Math.max(-NOTE_ACTION_MAX_DRAG, Math.min(NOTE_ACTION_MAX_DRAG, dx));
          setNoteSwipeVisual(liveOffset, false);
          if (liveOffset <= -NOTE_ACTION_ACTIVATE) {
            dragging = false;
            triggered = true;
            setNoteSwipeVisual(0, true);
            deleteCampaignNote(row.dataset.noteId);
            return;
          }
          if (liveOffset >= NOTE_ACTION_ACTIVATE) {
            dragging = false;
            triggered = true;
            setNoteSwipeVisual(0, true);
            startEditCampaignNote(row.dataset.noteId);
          }
        }, { passive: true });
      });
    }

    function startEditCampaignNote(noteId) {
      const note = campaignNotes.find(entry => entry.noteId === noteId);
      if (!note) return;
      campaignNoteEditingId = noteId;
      campaignNoteDraft = note.body;
      document.getElementById('campaignNotesBody').value = note.body;
      cacheCampaignNotesDraft(note.body, noteId);
      setCampaignNotesStatus('Editing note.');
      renderCampaignNotes();
      syncCampaignNoteComposerUi();
      focusCampaignNoteComposer(true);
    }

    function clearCampaignNoteComposer() {
      campaignNoteEditingId = '';
      campaignNoteDraft = '';
      const body = document.getElementById('campaignNotesBody');
      body.value = '';
      clearCampaignNotesDraft();
      setCampaignNotesStatus('Ready.');
      renderCampaignNotes();
      syncCampaignNoteComposerUi();
      focusCampaignNoteComposer(false);
    }

    function submitCampaignNote() {
      const bodyInput = document.getElementById('campaignNotesBody');
      const body = bodyInput.value.trim();
      if (!body) {
        setCampaignNotesStatus('<span class="error">Write a note first.</span>');
        return;
      }

      const nowIso = new Date().toISOString();
      const isEditing = Boolean(campaignNoteEditingId);
      const tempId = isEditing ? campaignNoteEditingId : `temp_${Date.now()}`;
      const previousNotes = campaignNotes.slice();
      const existing = campaignNotes.find(note => note.noteId === campaignNoteEditingId);
      const optimistic = {
        noteId: tempId,
        createdAt: existing ? existing.createdAt : nowIso,
        updatedAt: nowIso,
        updatedBy: 'You',
        body,
        _pending: true
      };

      if (isEditing) {
        campaignNotes = campaignNotes.map(note => note.noteId === campaignNoteEditingId ? optimistic : note);
      } else {
        campaignNotes = [...campaignNotes, optimistic];
      }

      campaignNotesLoaded = true;
      campaignNoteDraft = '';
      campaignNotesSaving = true;
      renderCampaignNotes();
      scrollCampaignNotesToBottom();
      updateCampaignNotesMeta();
      setCampaignNotesStatus(isEditing ? 'Updating…' : 'Adding…');
      bodyInput.value = '';
      campaignNoteEditingId = '';
      clearCampaignNotesDraft();
      syncCampaignNoteComposerUi();

      const runner = google.script.run
        .withSuccessHandler(res => {
          campaignNotesSaving = false;
          if (!res || !res.ok || !res.note) {
            campaignNotes = previousNotes;
            renderCampaignNotes();
            updateCampaignNotesMeta();
            setCampaignNotesStatus(`<span class="error">${escapeHtml((res && res.error) || 'Note save failed.')}</span>`);
            campaignNoteEditingId = isEditing ? tempId : '';
            bodyInput.value = body;
            campaignNoteDraft = body;
            cacheCampaignNotesDraft(body, campaignNoteEditingId);
            syncCampaignNoteComposerUi();
            return;
          }

          if (isEditing) {
            campaignNotes = campaignNotes.map(note => note.noteId === tempId ? res.note : note);
          } else {
            campaignNotes = campaignNotes.map(note => note.noteId === tempId ? res.note : note);
          }
          renderCampaignNotes();
          scrollCampaignNotesToBottom();
          updateCampaignNotesMeta();
          setCampaignNotesStatus(`<span class="success">${escapeHtml(res.message || 'Note saved.')}</span>`);
          syncCampaignNoteComposerUi();
        })
        .withFailureHandler(err => {
          campaignNotesSaving = false;
          campaignNotes = previousNotes;
          renderCampaignNotes();
          updateCampaignNotesMeta();
          setCampaignNotesStatus(`<span class="error">Note save failed: ${escapeHtml(err.message || err)}</span>`);
          campaignNoteEditingId = isEditing ? tempId : '';
          bodyInput.value = body;
          campaignNoteDraft = body;
          cacheCampaignNotesDraft(body, campaignNoteEditingId);
          syncCampaignNoteComposerUi();
        });

      if (isEditing) {
        runner.apiUpdateCampaignNote({ noteId: tempId, body });
      } else {
        runner.apiAddCampaignNote({ body });
      }
    }

    function deleteCampaignNote(noteId) {
      const note = campaignNotes.find(entry => entry.noteId === noteId);
      if (!note) return;
      const previousNotes = campaignNotes.slice();
      campaignNotes = campaignNotes.filter(entry => entry.noteId !== noteId);
      renderCampaignNotes();
      updateCampaignNotesMeta();
      setCampaignNotesStatus('Deleting…');

      google.script.run
        .withSuccessHandler(res => {
          if (!res || !res.ok) {
            campaignNotes = previousNotes;
            renderCampaignNotes();
            updateCampaignNotesMeta();
            setCampaignNotesStatus(`<span class="error">${escapeHtml((res && res.error) || 'Delete failed.')}</span>`);
            return;
          }
          setCampaignNotesStatus(`<span class="success">${escapeHtml(res.message || 'Note deleted.')}</span>`);
        })
        .withFailureHandler(err => {
          campaignNotes = previousNotes;
          renderCampaignNotes();
          updateCampaignNotesMeta();
          setCampaignNotesStatus(`<span class="error">Delete failed: ${escapeHtml(err.message || err)}</span>`);
        })
        .apiDeleteCampaignNote(noteId);
    }
